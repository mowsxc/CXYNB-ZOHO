<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="创新意电竞馆财务报表 - 实时数据看板">
<meta name="theme-color" content="#070b16">
<title>创新意 · 电竞馆 - 财务报表</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #10b981;
    --green-glow: rgba(16,185,129,.3);
    --amber: #f59e0b;
    --amber-glow: rgba(245,158,11,.3);
    --red: #f43f5e;
    --red-glow: rgba(244,63,94,.3);
    --purple: #8b5cf6;
    --purple-glow: rgba(139,92,246,.35);
    --pink: #ff1a75;
    --pink-glow: rgba(255,26,117,.35);
    --bg-deep: #070b16;
    --surface: rgba(18,28,50,.72);
    --surface-hover: rgba(24,36,62,.82);
    --surface-dark: rgba(8,14,28,.88);
    --surface-card: rgba(18,28,52,.62);
    --border: rgba(255,255,255,.09);
    --border-hover: rgba(255,255,255,.16);
    --t-primary: #f1f5f9;
    --t-secondary: #94a3b8;
    --t-tertiary: #64748b;
    --t-quaternary: #64748b;
    --muted: #5a6a80;
    --text-muted: #64748b;
    --accent: var(--green);
    --accent2: var(--purple);
    --accent2-hover: #7c3aed;
    --thead-bg: rgba(7,11,22,.94);
    --stat-icon-bg: rgba(16,185,129,.1);
    --orb-opacity: .28;
    --grid-opacity: .025;
    --grid-stroke: rgba(255,255,255,.6);
    --card-glow: none;
    --hint-color: var(--t-tertiary);
    --radius-lg: 18px;
    --radius: 14px;
    --radius-sm: 10px;
    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", "Cascadia Code", "Consolas", monospace;
    --cash-from: #3b1264;
    --cash-mid: #5b21b6;
    --cash-to: #7c3aed;
    --cash-glow: rgba(139,92,246,.35);
  }

  [data-theme="light"] {
    --green: #059669;
    --green-glow: rgba(5,150,105,.12);
    --amber: #d97706;
    --amber-glow: rgba(217,119,6,.12);
    --red: #dc2626;
    --red-glow: rgba(220,38,38,.12);
    --purple: #7c3aed;
    --purple-glow: rgba(124,58,237,.12);
    --pink: #e11d6e;
    --pink-glow: rgba(225,29,110,.12);
    --bg-deep: #f8fafc;
    --surface: rgba(255,255,255,.82);
    --surface-hover: rgba(255,255,255,.94);
    --surface-dark: rgba(255,255,255,.95);
    --surface-card: rgba(255,255,255,.68);
    --border: rgba(0,0,0,.07);
    --border-hover: rgba(0,0,0,.13);
    --t-primary: #1a1a2e;
    --t-secondary: #4a4a6a;
    --t-tertiary: #5a5a7a;
    --t-quaternary: #7a7a9a;
    --muted: #6a6a8a;
    --text-muted: #5a5a7a;
    --accent: var(--green);
    --accent2: var(--purple);
    --accent2-hover: #6d28d9;
    --thead-bg: rgba(255,255,255,.94);
    --stat-icon-bg: rgba(5,150,105,.08);
    --orb-opacity: .06;
    --grid-opacity: .03;
    --grid-stroke: rgba(0,0,0,.06);
    --card-glow: 0 4px 24px rgba(124,58,237,.06);
    --hint-color: #5a5a7a;
    --cash-from: #5b21b6;
    --cash-mid: #7c3aed;
    --cash-to: #8b5cf6;
    --cash-glow: rgba(139,92,246,.2);
  }

  [data-theme="light"] .brand-info h1 { color: #7c3aed; }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-deep);
    color: var(--t-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    font-size: 14px;
    line-height: 1.6;
}

  /* ---- Ambient BG ---- */
  .bg-layer { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; contain:strict; }
  body.is-scrolling .bg-layer,
  body.is-scrolling .bg-orb,
  body.is-scrolling .bg-particle,
  body.is-scrolling .bg-grid,
  body.is-scrolling .logo-pulse,
  body.is-scrolling .logo-halo,
  body.is-scrolling .glassOrbs,
  body.is-scrolling .barBreathe,
  body.is-scrolling .cash-blink,
  body.is-scrolling .syncIconSpin { animation-play-state: paused !important; }
  body.is-scrolling .card-back .fb-cur { animation-play-state: paused !important; }
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(60px); opacity: var(--orb-opacity);
  backface-visibility: hidden;
}
  .bg-orb-1 { width:700px; height:700px; background:radial-gradient(circle, var(--green-glow), transparent 70%); top:-25%; left:-20%; animation:drift1 32s ease-in-out infinite; }
  .bg-orb-2 { width:550px; height:550px; background:radial-gradient(circle, var(--purple-glow), transparent 70%); bottom:-20%; right:-15%; animation:drift2 38s ease-in-out infinite; }
  .bg-orb-3 { width:450px; height:450px; background:radial-gradient(circle, var(--amber-glow), transparent 70%); top:40%; right:-25%; animation:drift3 28s ease-in-out infinite; }
  @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(80px,-60px) scale(1.1)} 50%{transform:translate(-20px,40px) scale(.9)} 75%{transform:translate(-50px,-30px) scale(1.05)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-70px,-50px) scale(1.12)} 66%{transform:translate(50px,40px) scale(.85)} }
  @keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-80px,-40px) scale(1.08)} 66%{transform:translate(30px,60px) scale(.92)} }

  .bg-particles {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    opacity: .35;
  }
  .bg-particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(255,255,255,.5);
    animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .bg-grid {
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:var(--grid-opacity);
    background-image:
      linear-gradient(var(--grid-stroke) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-stroke) 1px, transparent 1px);
    background-size:64px 64px;
    animation: gridBreathe 8s ease-in-out infinite;
  }
  @keyframes gridBreathe {
    0%,100% { opacity: var(--grid-opacity); }
    50% { opacity: calc(var(--grid-opacity) * 1.6); }
  }

  .bg-noise {
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 1080px;
    margin: 0 auto;
    padding: 44px 20px 56px;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    cursor: pointer;
  }
  .brand-logo {
    width: 88px; height: 88px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .brand-logo svg {
    width: 88px; height: 88px;
    stroke: var(--purple);
    animation: logo-pulse 3s ease-in-out infinite;
  }
  @keyframes logo-pulse {
    0%,100% { opacity: .85; }
    50% { opacity: 1; }
  }
  .brand-logo::after {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--purple-glow), transparent 70%);
    animation: logo-halo 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes logo-halo {
    0%,100% { opacity: .6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  .brand-info h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: .08em;
    line-height: 1.2;
    color: #f1f5f9;
  }
  .brand-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow), 0 0 20px var(--green-glow);
    vertical-align: middle;
    margin: 0 6px;
    position: relative;
    top: -1px;
  }

  /* ---- PERIOD SELECTOR ---- */
  .period-group {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .period-pill {
    display: inline-flex;
    align-items: center;
    gap: 0;
    background:
      linear-gradient(180deg, rgba(255,255,255,.05) 0%, transparent 50%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.08) inset,
      0 4px 24px rgba(0,0,0,.25);
    user-select: none;
    padding: 0 4px;
  }
  #yrOpts, #moOpts { display: inline-flex; align-items: center; }

  .per-div {
    width: 1px; height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }

  .per-opt {
    display: inline-block;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    color: var(--t-primary);
    overflow: hidden;
    vertical-align: middle;
    transition: max-width .3s ease, padding .3s ease, opacity .2s ease, color .15s, transform .15s;
  }
  .per-opt:hover { color: var(--t-primary); }
  .per-opt:active { transform: scale(.9); }
  .per-opt.yr { max-width: 53px; padding: 8px 11px; letter-spacing: .02em; }
  .per-opt.yr.sel { color: var(--t-primary); }
  .per-opt.mo { max-width: 36px; padding: 8px 8px; }
  .per-opt.mo.sel { color: var(--purple); }
  .per-opt.yr.hide, .per-opt.mo.hide {
    max-width: 0;
    padding-left: 0; padding-right: 0;
    opacity: 0;
    pointer-events: none;
  }

  .period-pill.pick-yr .per-opt.yr.hide,
  .period-pill.pick-mo .per-opt.mo.hide {
    max-width: 53px;
    padding-left: 11px; padding-right: 11px;
    opacity: 1;
    pointer-events: auto;
  }
  .period-pill.pick-mo .per-opt.mo.hide {
    max-width: 36px;
    padding-left: 8px; padding-right: 8px;
  }

  @media (max-width:600px) {
    .per-opt { font-size: 13px; }
    .per-opt.yr { max-width: 46px; padding: 7px 9px; }
    .per-opt.mo { max-width: 30px; padding: 7px 6px; }
    .period-pill.pick-yr .per-opt.yr.hide { max-width: 46px; padding-left: 9px; padding-right: 9px; }
    .period-pill.pick-mo .per-opt.mo.hide { max-width: 30px; padding-left: 6px; padding-right: 6px; }
  }

  .sync-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 6px 16px;
    font-size: 11px;
    color: var(--t-quaternary);
    letter-spacing: .03em;
  background: var(--surface-dark);
  border-top: 1px solid var(--border);
}
  .sync-bar svg {
    width: 12px; height: 12px;
    flex-shrink: 0;
    color: var(--green);
    animation: syncIconSpin 3s linear infinite;
  }
  .version-link {
    margin-left: 8px;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--t-tertiary);
    text-decoration: none;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.06);
    transition: color .2s, background .2s, border-color .2s;
  }
  .version-link:hover { color: var(--accent2); background: rgba(139,92,246,.08); border-color: rgba(139,92,246,.2); }
  }
  @keyframes syncIconSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .add-modal {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    visibility: hidden; opacity: 0; pointer-events: none;
    transition: visibility 0s .3s, opacity .3s ease-out;
    -webkit-tap-highlight-color: transparent;
  }
  .add-modal.open { visibility: visible; opacity: 1; pointer-events: auto; transition: visibility 0s 0s, opacity .3s ease-out; }
  .add-modal::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,.6);
    opacity: 0; transition: opacity .35s ease-out;
  }
  .add-modal.open::before { opacity: 1; }
  .add-card {
    position: relative; z-index: 1;
    background: var(--surface-dark); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 28px 24px; width: 90%; max-width: 400px;
    box-shadow: 0 16px 64px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.04) inset;
    opacity: 0;
    transform: scale(0);
    transform-origin: var(--modal-ox, 50%) var(--modal-oy, 50%);
    transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .25s ease-out;
    will-change: transform, opacity;
  }
  .add-modal.open .add-card { transform: scale(1); opacity: 1; }
  .add-card h3 { margin: 0 0 16px; font-size: 16px; font-weight: 600; color: var(--t-primary); }
  .add-card-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  }
  .add-card-header h3 { margin: 0; }
  .add-icon { width: 20px; height: 20px; color: var(--accent2); flex-shrink: 0; }
  .add-card input {
    width: 100%; padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface); color: var(--t-primary); font-size: 14px; outline: none; box-sizing: border-box;
    transition: border-color .25s, box-shadow .25s;
  }
  .add-card input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
  .add-card input::placeholder { color: var(--t-quaternary); }
  .add-status { display: block; margin-top: 8px; font-size: 13px; color: var(--t-tertiary); min-height: 20px; }
  .add-acts { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .add-acts button {
    padding: 10px 22px; border-radius: var(--radius); font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; transition: background .2s, color .2s, transform .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .add-acts button:active { transform: scale(.96); }
  .btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border)!important; }
  .btn-cancel:hover { color: var(--t-primary); border-color: var(--t-tertiary)!important; background: rgba(255,255,255,.03); }
  .btn-submit { background: var(--accent2); color: #fff; }
  .btn-submit:hover { background: var(--accent2-hover); }
  .pin-card { text-align: center; max-width: 360px; }
  .pin-icon { margin: 0 auto 16px; width: 48px; height: 48px; color: var(--accent2); }
  .pin-icon svg { width: 100%; height: 100%; }
  .pin-input-group { display: flex; justify-content: center; }
  .pin-input-group input {
    width: 80px; text-align: center; font-size: 28px; font-family: var(--font-mono);
    font-weight: 700; letter-spacing: .2em; padding: 12px; border-radius: var(--radius);
    background: var(--surface); border: 2px solid var(--border); color: var(--t-primary);
    outline: none; transition: border-color .25s, box-shadow .25s;
    -webkit-text-security: disc;
    caret-color: var(--accent2);
  }
  .pin-input-group input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
  @media (max-width: 480px) {
    .add-card { padding: 24px 20px; width: 92%; }
    .pin-card { max-width: 300px; }
    .pin-input-group input { width: 72px; font-size: 24px; padding: 10px; }
  }

  .theme-toggle {
    position: fixed; top: 16px; right: 20px; z-index: 100;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .3s, border-color .3s, box-shadow .3s, transform .4s cubic-bezier(.4,0,.2,1);
    color: var(--t-secondary);
    overflow: hidden;
  }
  .theme-toggle .icon-sun,
  .theme-toggle .icon-moon {
    width: 20px; height: 20px;
    position: absolute;
    transition: transform .5s cubic-bezier(.4,0,.2,1), opacity .3s;
  }
  .theme-toggle .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }
  .theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg) scale(.5); }
  .theme-toggle.sunny .icon-sun { opacity: 0; transform: rotate(90deg) scale(.5); }
  .theme-toggle.sunny .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
  .theme-toggle:hover { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 20px var(--purple-glow); }
  .theme-toggle:active { transform: rotate(30deg) scale(.85); }
  .theme-toggle.sunny { color: var(--amber); border-color: var(--amber); }
  .theme-toggle.sunny:hover { box-shadow: 0 0 20px var(--amber-glow); }

  /* ---- STAT CARDS ---- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    position: relative;
    background:
      linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 60%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 24px;
    contain: layout style paint;
    overflow: hidden;
    backface-visibility: hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 0 0 1px rgba(255,255,255,.03) inset,
      0 4px 24px rgba(0,0,0,.18);
    transition: border-color .3s, transform .4s cubic-bezier(.25,.8,.25,1.2);
  }
  .stat-card:hover {
    border-color: var(--border-hover);
    box-shadow:
      0 1px 0 rgba(255,255,255,.1) inset,
      0 0 0 1px rgba(255,255,255,.06) inset,
      0 12px 48px rgba(0,0,0,.28);
    transform: perspective(600px) rotateX(2deg) translateY(-4px);
  }
  .stat-card:active {
    transform: perspective(600px) rotateX(0deg) translateY(0) scale(.98);
    transition-duration: .1s;
  }
  .stat-card::after {
    content: '';
    position: absolute; inset: -25%;
    border-radius: inherit;
    pointer-events: none; z-index: -1;
    background:
      radial-gradient(ellipse 35% 30% at 25% 35%, rgba(255,255,255,.07), transparent 60%),
      radial-gradient(ellipse 22% 28% at 72% 65%, rgba(255,255,255,.04), transparent 55%),
      radial-gradient(ellipse 18% 22% at 50% 15%, rgba(255,255,255,.05), transparent 50%);
    animation: glassOrbs 10s ease-in-out infinite;
    opacity: .5;
  }
  @keyframes glassOrbs {
    0%   { transform: translate(0, 0); }
    33%  { transform: translate(4%, -3%); }
    66%  { transform: translate(-3%, 4%); }
    100% { transform: translate(0, 0); }
  }
  .stat-card::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: var(--radius-lg);
    opacity: 0; transition: opacity .4s;
    pointer-events: none; z-index: -1;
  }
  .stat-card.s-income::before { background: radial-gradient(ellipse 80% 80% at 0% 0%, var(--green-glow), transparent); }
  .stat-card.s-meituan::before { background: radial-gradient(ellipse 80% 80% at 0% 0%, var(--amber-glow), transparent); }
  .stat-card.s-expense::before { background: radial-gradient(ellipse 80% 80% at 0% 0%, var(--red-glow), transparent); }
  .stat-card.s-cash::before { background: radial-gradient(ellipse 80% 80% at 0% 0%, var(--purple-glow), transparent); }
  .stat-card:hover::before { opacity: 1; }

  .stat-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    position: relative; z-index: 1;
  }
  .s-income .stat-icon { background: rgba(16,185,129,.14); color: var(--green); }
  .s-meituan .stat-icon { background: rgba(245,158,11,.14); color: var(--amber); }
  .s-expense .stat-icon { background: rgba(244,63,94,.14); color: var(--red); }
  .s-cash .stat-icon { background: rgba(255,26,117,.14); color: var(--pink); }
  .stat-icon svg { width: 16px; height: 16px; }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--t-quaternary);
    letter-spacing: .1em;

  .s-income .stat-value { color: var(--green); }
  .s-meituan .stat-value { color: var(--amber); }
  .s-expense .stat-value { color: var(--red); }
  .s-cash .stat-value { color: var(--pink); }

  /* ---- ITEM CARDS ---- */
  .items {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .item-card {
    position: relative; perspective: 800px;
    border-radius: var(--radius);
    overflow: visible;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
    cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    width: 100%; min-height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    background:
      linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 70%),
      var(--surface);
    border: 1px solid var(--border);
    border-top-color: rgba(255,255,255,.12);
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 4px 20px rgba(0,0,0,.14);
    contain: layout style paint;
    text-align: center;
    overflow: hidden;
    position: relative;
  }
  .card-face::after {
    content: '';
    position: absolute; inset: -25%;
    border-radius: inherit;
    pointer-events: none; z-index: -1;
    background:
      radial-gradient(ellipse 30% 25% at 30% 40%, rgba(255,255,255,.06), transparent 55%),
      radial-gradient(ellipse 20% 22% at 70% 65%, rgba(255,255,255,.04), transparent 50%);
    animation: glassOrbs 8s ease-in-out infinite;
    animation-delay: -3s;
    opacity: .45;
  }
  .card-front { padding: 18px 16px; }
  .card-back {
    position: absolute; inset: 0;
    transform: rotateY(180deg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 16px 12px;
    background: linear-gradient(160deg, var(--surface), rgba(255,255,255,.03));
  }
  .card-back .fb-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: var(--t-quaternary); }
  .card-back .fb-sep { width: 28px; height: 1px; background: var(--border); margin: 4px 0 6px; }
  .card-back .fb-cur { font-size: 16px; font-family: var(--font-mono); font-weight: 700; letter-spacing: -.02em; line-height: 1.2; display: inline-block; animation: cashBreathe 2s ease-in-out infinite; }
  .card-back .fb-prev { font-size: 10px; color: var(--t-quaternary); }
  .card-back .fb-prev span { font-family: var(--font-mono); color: var(--t-secondary); }
  .card-back .fb-delta { font-size: 16px; font-family: var(--font-mono); font-weight: 700; margin-top: 2px; letter-spacing: -.02em; }
  .card-back .fb-delta.up { color: var(--green); }
  .card-back .fb-delta.down { color: var(--red); }
  .card-back .fb-arrow { font-size: 12px; margin-left: 2px; }

  .card-inner:not(.flipped):hover .card-front {
    border-color: var(--border-hover);
    box-shadow:
      0 1px 0 rgba(255,255,255,.1) inset,
      0 12px 40px rgba(0,0,0,.24);
    transform: perspective(500px) rotateX(3deg) translateY(-3px);
  }
  .card-inner.flipped:hover .card-back {
    border-color: var(--border-hover);
  }
  .card-front::before, .card-back::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: var(--radius);
    opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  .ic-green .card-front::before, .ic-green .card-back::before { background: radial-gradient(ellipse 60% 60% at 50% 0%, var(--green-glow), transparent); }
  .ic-red .card-front::before, .ic-red .card-back::before { background: radial-gradient(ellipse 60% 60% at 50% 0%, var(--red-glow), transparent); }
  .ic-amber .card-front::before, .ic-amber .card-back::before { background: radial-gradient(ellipse 60% 60% at 50% 0%, var(--amber-glow), transparent); }
  .ic-purple .card-front::before, .ic-purple .card-back::before { background: radial-gradient(ellipse 60% 60% at 50% 0%, var(--purple-glow), transparent); }
  .card-inner:not(.flipped):hover .card-front::before { opacity: 1; }
  .card-inner.flipped:hover .card-back::before { opacity: 1; }

  .item-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center; justify-content: center;
    margin-bottom: 10px;
    position: relative; z-index: 1;
  }
  .item-icon svg { width: 14px; height: 14px; }
  .ic-green .item-icon { background: rgba(16,185,129,.12); color: var(--green); }
  .ic-red .item-icon { background: rgba(244,63,94,.12); color: var(--red); }
  .ic-amber .item-icon { background: rgba(245,158,11,.12); color: var(--amber); }
  .ic-purple .item-icon { background: rgba(139,92,246,.12); color: var(--purple); }

  .item-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    color: var(--t-quaternary);
    margin-bottom: 4px;
    position: relative; z-index: 1;
  }
  .item-value {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -.02em;
    font-family: var(--font-mono);
    position: relative; z-index: 1;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
  }
  .ic-green .item-value { color: var(--green); }
  .ic-red .item-value { color: var(--red); }
  .ic-amber .item-value { color: var(--amber); }
  .ic-purple .item-value { color: var(--pink); }

  .cash-blink {
    animation: cashBreathe 1.8s ease-in-out infinite;

  }
  @keyframes cashBreathe {
    0%,100% { transform: scale(1); text-shadow: 0 0 0 transparent; }

  }

  .card-tooltip {
    display: none;
  }

  /* ---- TREND PANEL ---- */
  .trend-panel {
    background:
      linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 60%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 16px;
    margin-bottom: 32px;
    overflow: hidden;
    contain: layout style paint;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 4px 24px rgba(0,0,0,.18);
  }
  .trend-panel::after {
    content: '';
    position: absolute; inset: -25%;
    pointer-events: none; z-index: -1;
    background:
      radial-gradient(ellipse 40% 25% at 20% 30%, rgba(255,255,255,.06), transparent 60%),
      radial-gradient(ellipse 25% 20% at 80% 70%, rgba(255,255,255,.04), transparent 55%);
    animation: glassOrbs 12s ease-in-out infinite;
    animation-delay: -5s;
    opacity: .4;
  }
  .trend-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
  .trend-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--t-quaternary);
    white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .trend-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--amber);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .trend-ranges { display: flex; gap: 4px; }
  .range-btn {
    font-size: 10px; font-family: inherit; color: var(--t-tertiary);
    background: transparent; border: 1px solid var(--border); border-radius: 5px;
    padding: 3px 10px; cursor: pointer; transition: color .2s, border-color .2s, background .2s, transform .15s; white-space: nowrap;
  }
  .range-btn:hover { color: var(--t-primary); border-color: var(--border-hover); background: rgba(255,255,255,.03); }
  .range-btn:active { background: rgba(255,255,255,.05); transform: scale(.92); }
  .range-btn.sel {
    color: var(--amber); border-color: var(--amber); background: var(--amber-glow);
  }
  .range-btn.sel:hover { background: rgba(245,158,11,.15); }
  .fs-btn {
    flex-shrink: 0; width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
    color: var(--t-tertiary); transition: color .2s, background .2s, border-color .2s, transform .15s;
  }
  .fs-btn svg { width: 14px; height: 14px; }
  .fs-btn:hover { color: var(--t-primary); border-color: var(--border-hover); background: rgba(255,255,255,.03); }
  .fs-btn:active { background: rgba(255,255,255,.05); color: var(--amber); transform: scale(.9); }
  .trend-chart-wrap { overflow-x: auto; text-align: center; }
  .trend-legend {
    display: flex; justify-content: center; gap: 16px;
    margin-top: 10px; font-size: 10px; color: var(--t-tertiary); flex-wrap: wrap;
  }
  .trend-legend .leg-item { display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: background .2s, opacity .2s; }
  .trend-legend .leg-item:hover { background: rgba(255,255,255,.05); }
  .trend-legend .leg-item:active { background: rgba(255,255,255,.08); }
  .trend-legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; }
  .trend-legend .dot.pink { background: var(--pink); }
  .trend-legend .dot.green { background: var(--green); }
  .trend-legend .dot.red { background: var(--red); }
  .trend-legend .dot.amber { background: var(--amber); }
  .trend-legend .dot.cyan { background: #22d3ee; }

  /* ---- CHART INTERACTION ---- */
  .chart-skeleton {
    position: relative;
    background: rgba(255,255,255,.02);
    border-radius: 8px;
    height: 200px; margin: 8px 0;
    overflow: hidden;
  }
  .chart-skeleton::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.04) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .chart-skeleton::after {
    content: '';
    position: absolute;
    bottom: 30px; left: 20px; right: 20px;
    height: 120px;
    background:
      repeating-linear-gradient(90deg,
        rgba(255,255,255,.04) 0px, rgba(255,255,255,.04) 14px,
        transparent 14px, transparent 18px,
        rgba(255,255,255,.03) 18px, rgba(255,255,255,.03) 28px,
        transparent 28px, transparent 32px,
        rgba(255,255,255,.05) 32px, rgba(255,255,255,.05) 42px,
        transparent 42px, transparent 46px,
        rgba(255,255,255,.03) 46px, rgba(255,255,255,.03) 56px,
        transparent 56px, transparent 60px,
        rgba(255,255,255,.04) 60px, rgba(255,255,255,.04) 70px,
        transparent 70px, transparent 74px
      );
    mask-image: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .trend-bar {
    transform-box: fill-box; transform-origin: bottom;
    transition: opacity .2s, filter .2s;
    animation: barBreathe 3s ease-in-out infinite;
    opacity: .92;
  }
  .trend-bar:nth-child(2n) { animation-delay: 0.3s; }
  .trend-bar:nth-child(3n) { animation-delay: 0.6s; }
  .trend-bar:nth-child(4n) { animation-delay: 0.9s; }
  .trend-bar:nth-child(5n) { animation-delay: 1.2s; }
  @keyframes barBreathe { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.03)} }
  .trend-bar:hover, .trend-bar:active { opacity: 1; filter: brightness(1.3); }
  .trend-tip {
    text-align: center; font-size: 12px; font-family: var(--font-mono);
    color: var(--t-primary); margin-top: 6px;
    padding: 6px 12px; background: var(--surface); border-radius: 6px;
    display: inline-block; transition: opacity .2s;
  }
  .trend-tip-wrap { text-align: center; min-height: 28px; }

  /* ---- CHART FULLSCREEN ---- */
  .chart-fullscreen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg-deep);
    display: none; align-items: center; justify-content: center;
  }
  .chart-fullscreen.open { display: flex; }
  .chart-fs-inner {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; box-sizing: border-box;
  }
  .chart-fs-inner .trend-chart { max-width: 100%; max-height: 100%; }
  .fs-close {
    position: absolute; top: 16px; right: 16px; z-index: 1;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--t-secondary); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, color .2s, border-color .2s;
  }
  .fs-close:hover, .fs-close:active { background: var(--surface-hover); color: var(--t-primary); border-color: var(--border-hover); }
  @media (max-width: 768px) {
    .chart-fs-inner {
      transform: rotate(90deg);
      width: 100vh; height: 100vw;
      padding: 12px;
      flex-direction: row;
    }
    .fs-close { top: 8px; right: 8px; width: 32px; height: 32px; font-size: 14px; }
  }

  /* ---- GLASS PANEL ---- */
  .panel {
    background:
      linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 70%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 4px 24px rgba(0,0,0,.18);
    contain: layout style paint;
  }
  .panel::after {
    content: '';
    position: absolute; inset: -25%;
    pointer-events: none; z-index: -1;
    background:
      radial-gradient(ellipse 35% 22% at 25% 25%, rgba(255,255,255,.05), transparent 55%),
      radial-gradient(ellipse 20% 18% at 75% 70%, rgba(255,255,255,.03), transparent 50%);
    animation: glassOrbs 10s ease-in-out infinite;
    animation-delay: -7s;
    opacity: .35;
  }
  .cols-2 .panel { margin-bottom: 0; }

  .panel-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--t-secondary);
  }
  .panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;

  }
  .pd-green { background: var(--green); box-shadow: 0 0 10px var(--green-glow); }
  .pd-red { background: var(--red); box-shadow: 0 0 10px var(--red-glow); }
  .pd-purple { background: var(--purple); box-shadow: 0 0 10px var(--purple-glow); }

  .panel-row {

  .panel-row:last-child { border-bottom: none; }
  .panel-row:hover { background: rgba(255,255,255,.02); }

  .panel-row .val {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -.01em;

  .val-red { color: var(--red); }

    font-size: 15px;

  /* ---- CASH HERO ---- */
  .cash-section {
    position: relative;

    align-items: flex-start;

  /* ---- TABLE ---- */
   .table-scroll {
     overflow-x: auto;
     overscroll-behavior-x: contain;
     position: relative;
   }
   .table-scroll::after {
     content: '';
     position: sticky;
     right: 0; top: 0; bottom: 0;
     width: 32px;
     background: linear-gradient(90deg, transparent, var(--bg-deep));
     pointer-events: none;
     z-index: 3;
     opacity: 0;
     transition: opacity .2s;
   }
   .table-scroll.is-scrollable::after { opacity: 1; }
   .table-scroll.is-scrolled::after { opacity: 0; }
  .table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .table-scroll::-webkit-scrollbar-track { background: transparent; }
  .table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }
  .table-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.14); }

  .table-scroll table {
    width: 100%;
    min-width: 860px;

    font-size: 13px;

    transition: background .12s, border-color .2s;
    border-left: 3px solid transparent;
  }
  .table-scroll tbody tr:nth-child(even) { background: rgba(255,255,255,.025); }
  .table-scroll tbody tr:hover { background: rgba(255,255,255,.05) !important; border-left-color: var(--accent2); }
  .table-scroll tbody tr:nth-child(even):hover { background: rgba(255,255,255,.06) !important; }

  td.align-right { text-align: right; }

  td.cell-date::before {

  td.cell-mt { color: var(--amber); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  td.cell-wf { color: var(--green); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  td.cell-sl { color: var(--green); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  td.cell-ex { color: var(--red); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  td.cell-rf { color: var(--green); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }

  td.cell-memo {
    max-width: none;
    white-space: nowrap;
    color: var(--t-tertiary);
    font-size: 12px;
  }

  /* ---- LOADING ---- */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 120px 0;
    color: var(--t-secondary);
    font-size: 14px;
    font-weight: 500;
  }
  .loading-ring {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--purple);
    animation: spin .65s linear infinite;
    box-shadow: 0 0 14px rgba(139,92,246,.25), 0 0 4px rgba(139,92,246,.4) inset;
  }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  #content { animation: fadeInUp .4s ease-out; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 48px;
    color: var(--red);
    font-size: 14px;
    font-weight: 500;
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 860px) {
    .app { padding: 28px 12px 40px; }
    .brand-logo { width: 66px; height: 66px; }
    .brand-logo svg { width: 66px; height: 66px; }
    .brand-info h1 { font-size: 20px; }
    .stats { grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { padding: 20px 16px; }
    .stat-value { font-size: 23px; }
    .stat-value.mono { font-size: 20px; }
    .items { grid-template-columns: repeat(3, 1fr); }
    .table-scroll table { min-width: 700px; font-size: 12px; }
    .table-scroll thead th { padding: 10px 10px; font-size: 12px; }
    .table-scroll tbody td { padding: 8px 10px; font-size: 12px; }
    .panel-row { padding: 13px 18px; }
    .panel-head { padding: 15px 18px; }
    .trend-panel { padding: 16px 10px; }
    .trend-header { flex-wrap: wrap; }
    .range-btn { font-size: 9px; padding: 3px 8px; }
  }

  @media (max-width: 420px) {
    .items { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .card-front { padding: 14px 10px; }
    .item-value { font-size: 14px; }
    .stat-card { padding: 16px 14px; }
    .stat-value { font-size: 20px; }
    .stat-value.mono { font-size: 18px; }
    .trend-panel { padding: 14px 8px; }
    .trend-header { gap: 6px; }
    .trend-title { font-size: 11px; }
    .range-btn { font-size: 9px; padding: 2px 7px; }
    .fs-btn { width: 26px; height: 26px; }
    .cash-section { padding: 24px 20px; }
    .cash-right .cash-amount { font-size: 32px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

<script>
window._appVersion='dev';
function fm(v) {
  var s=String(v).replace(/[^\d.]/g,'');
  var n=parseFloat(s);
  return isNaN(n)?'':new Intl.NumberFormat('en-US',{minimumFractionDigits:0,maximumFractionDigits:2}).format(n);
}
function fmY(v) { var f=fm(v); return f?'\u00a5'+f:''; }
function isZero(v) { return isNaN(parseFloat(String(v).replace(/[^\d.]/g,''))); }
function isReallyZero(v) { return !isZero(v) && parseFloat(String(v).replace(/[^\d.]/g,''))===0; }
function fmOrBlank(v) { if (isZero(v)||isReallyZero(v)) return ''; return fm(v); }
function txtOrBlank(v) { return (!v||v==='0'||v==='0.00')?'':v; }
function hasData(r) {
  var ks=['美团','网费','售货','支出','退款'];
  for (var k=0;k<ks.length;k++) { if (!isZero(r[ks[k]])&&!isReallyZero(r[ks[k]])) return true; }
  return false;
}

function render(data) {
  var sx=window.scrollX||window.pageXOffset;
  var sy=window.scrollY||window.pageYOffset;
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('syncBar').style.display='flex';
  var curPeriod=data.period||'----/--';
  window._curPeriod=curPeriod;
  buildPeriodOpts();

  var s=data.summary||{};
  var cash=parseFloat((s['现金结余']||'0').replace(/[^\d.]/g,''))||0;
  var mt_=parseFloat((s['美团']||'0').replace(/[^\d.]/g,''))||0;
  var nf=parseFloat((s['网费']||'0').replace(/[^\d.]/g,''))||0;
  var sl=parseFloat((s['售货']||'0').replace(/[^\d.]/g,''))||0;
  var ex=parseFloat((s['支出']||'0').replace(/[^\d.]/g,''))||0;
  var getV=function(obj,key){return obj[key]||(key==='退款'?obj['退款金额']:'')||'0';};
  var rf=parseFloat(getV(s,'退款').replace(/[^\d.]/g,''))||0;
  var rev=nf+sl+rf;
  var M=' mono';

  // Store prev-month data for card comparison
  var tkeysAll=Object.keys(data.trends||{}).sort();
  var prevSum=null, prevPeriod=null;
  var cp=data.period||'';
  for(var ti=0;ti<tkeysAll.length;ti++){
    if(tkeysAll[ti]===cp){ if(ti>0){prevPeriod=tkeysAll[ti-1]; prevSum=((data.trends||{})[prevPeriod]||{});} break; }
  }
  if(!prevPeriod&&tkeysAll.length>1){ prevPeriod=tkeysAll[tkeysAll.length-2]; prevSum=((data.trends||{})[prevPeriod]||{}); }
  window._cardCompare={now:s, prev:prevSum, prevPeriod:prevPeriod, curPeriod:cp};

  var h='';

  /* --- Item cards --- */
  var cardDefs=[
    {key:'网费', cls:'ic-green', cur:nf, icon:'<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>'},
    {key:'售货', cls:'ic-green', cur:sl, icon:'<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>'},
    {key:'退款', cls:'ic-green', cur:rf, icon:'<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>'},
    {key:'支出', cls:'ic-red', cur:ex, icon:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>'},
    {key:'美团', cls:'ic-amber', cur:mt_, icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'},
    {key:'现金', cls:'ic-purple', cur:cash, icon:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>', blink:true}
  ];
  h+='<div class="items">';
  for (var ci=0;ci<cardDefs.length;ci++) {
    var cd=cardDefs[ci];
    var ck=cd.key==='现金'?'现金结余':cd.key;
    var prevVal=prevSum?parseFloat(getV(prevSum,ck).replace(/[^\d.]/g,''))||0:0;
    var delta=cd.cur-prevVal;
    var dSign=delta>=0?'+':''; var dCls=delta>=0?'up':'down';
    var pLabel=prevPeriod||'-';
    var blinkCls=cd.blink?' cash-blink':'';
    var back=prevSum
      ?'<div class="card-face card-back"><div class="fb-label">'+cd.key+' 月环比</div><div class="fb-sep"></div><div class="fb-cur">'+fmY(cd.cur)+'</div><div class="fb-prev">'+pLabel+' <span>'+fmY(prevVal)+'</span></div><div class="fb-delta '+dCls+'">'+dSign+fmY(delta)+' <span class="fb-arrow">'+(delta>=0?'&#9650;':'&#9660;')+'</span></div></div>'
      :'<div class="card-face card-back"><div class="fb-cur">'+fmY(cd.cur)+'</div><div class="fb-prev">暂无上月数据</div></div>';
    h+='<div class="item-card '+cd.cls+'"><div class="card-inner" onclick="event.stopPropagation();flipCard(this)">'
      +'<div class="card-face card-front"><div class="item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+cd.icon+'</svg></div><div class="item-title">'+cd.key+'</div><div class="item-value'+blinkCls+'">'+fmY(cd.cur)+'</div></div>'
      +back+'</div></div>';
  }
  h+='</div>';

  /* --- Trend chart --- */
  var trends=data.trends||{};
  var tkeys=Object.keys(trends).sort();
  if (tkeys.length>1) {
    var metrics=[
      {k:'网费',label:'网费',color:'var(--green)',cls:'green'},
      {k:'售货',label:'售货',color:'#22d3ee',cls:'cyan'},
      {k:'支出',label:'支出',color:'var(--red)',cls:'red'},
      {k:'美团',label:'美团',color:'var(--amber)',cls:'amber'},
      {k:'现金结余',label:'现金',color:'var(--pink)',cls:'pink'}
    ];
    var isMobile=window.innerWidth<768;
    var defaultR=isMobile?3:6;
    window._chartState={trends:trends, tkeys:tkeys, metrics:metrics, rangeN:defaultR};

    var leg='<div class="trend-legend">';
    metrics.forEach(function(m){
      leg+='<span class="leg-item" role="button" tabindex="0"><i class="dot '+m.cls+'"></i>'+m.label+'</span>';
    });
    leg+='</div>';
    var tip='<div class="trend-tip-wrap"><span class="trend-tip" id="trendTip" style="display:none"></span></div>';
    var btnQtr='<button class="range-btn'+(defaultR===3?' sel':'')+'" onclick="setChartRange(3,this)">季度</button>';
    var btnHalf='<button class="range-btn'+(defaultR===6?' sel':'')+'" onclick="setChartRange(6,this)">半年</button>';
    var btnYear='<button class="range-btn'+(defaultR===12?' sel':'')+'" onclick="setChartRange(12,this)">全年</button>';
    h+='<div class="trend-panel">'
      +'<div class="trend-header">'
      +'<span class="trend-title">月度趋势</span>'
      +'<div class="trend-ranges" id="trendRanges">'
      +btnQtr+btnHalf+btnYear
      +'</div>'
      +'<button class="fs-btn" onclick="toggleFullscreen()" title="全屏查看" aria-label="全屏查看图表">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>'
      +'</button>'
      +'</div>'
      +'<div class="trend-chart-wrap"><div class="chart-skeleton" id="chartSkel" style="display:block"></div><div id="chartSvg" style="display:none"></div></div>'
      +leg+tip+'</div>';
  }

  /* --- Daily table --- */
  var daily=(data.daily||[]).slice().reverse();
  var filtered=[];
  for (var i=0;i<daily.length;i++) { if (hasData(daily[i])) filtered.push(daily[i]); }

  if (filtered.length>0) {
    h+='<div class="table-scroll"><table><caption style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">每日明细</caption><thead><tr>';
    var cols=['日期','班次','美团','网费','售货','支出','退款','支出明细','退款明细'];
    for (var ci=0;ci<cols.length;ci++) {
      var ac=(ci>=2&&ci<=6)?' align-right':'';
      h+='<th class="'+ac+'">'+cols[ci]+'</th>';
    }
    h+='</tr></thead><tbody>';

    var lastDay='';
    for (var i=0;i<filtered.length;i++) {
      var r=filtered[i];
      var day=r['日期']||'';
      var divider=day!==lastDay&&i>0?' day-divider':'';
      var showDay=day!==lastDay?day:'';
      lastDay=day;
      var shift=r['班次']||'';

      h+='<tr class="'+divider+'">';
      h+='<td class="cell-date">'+showDay+'</td>';
      h+='<td class="cell-shift '+(shift==='白班'?'shift-day':'shift-night')+'">'+shift+'</td>';
      h+='<td class="cell-mt align-right">'+fmOrBlank(r['美团'])+'</td>';
      h+='<td class="cell-wf align-right">'+fmOrBlank(r['网费'])+'</td>';
      h+='<td class="cell-sl align-right">'+fmOrBlank(r['售货'])+'</td>';
      h+='<td class="cell-ex align-right">'+fmOrBlank(r['支出'])+'</td>';
      h+='<td class="cell-rf align-right">'+fmOrBlank(getV(r,'退款'))+'</td>';
      h+='<td class="cell-memo" title="'+(r['支出明细']||'')+'">'+txtOrBlank(r['支出明细'])+'</td>';
      h+='<td class="cell-memo" title="'+(r['退款明细']||'')+'">'+txtOrBlank(r['退款明细'])+'</td>';
      h+='</tr>';
    }
    h+='</tbody></table></div></div>';
  }



  document.getElementById('syncLabel').textContent='数据同步 '+new Date().toLocaleString('zh-CN');
  document.getElementById('versionLink').textContent='v'+(window._appVersion||'dev');
  var contentEl=document.getElementById('content');
  contentEl.style.opacity='0';
  contentEl.innerHTML=h;
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      contentEl.style.transition='opacity .3s ease-out';
      contentEl.style.opacity='1';
    });
  });
  var skel=document.getElementById('chartSkel');
  var svgDiv=document.getElementById('chartSvg');
  if (skel&&svgDiv) {
    svgDiv.innerHTML=buildChartSvg();
    skel.style.display='none';
    svgDiv.style.display='block';
  }
  window.scrollTo(sx, sy);
}

function buildChartSvg(rangeN) {
  var st=window._chartState;
  if (!st) return '';
  var trends=st.trends, tkeys=st.tkeys, metrics=st.metrics;
  var n=rangeN||st.rangeN||2;
  st.rangeN=n;
  var months=tkeys.slice(-n);
  if (months.length<2) months=tkeys.slice(-2);

  var maxV=0;
  metrics.forEach(function(m){
    tkeys.forEach(function(p){
      var v=parseFloat((trends[p][m.k]||'0').replace(/[^\d.]/g,''))||0;
      if (v>maxV) maxV=v;
    });
  });
  if (maxV===0) maxV=1;

  var isMob=window.innerWidth<768;
  var barW=isMob?13:18, barGap=isMob?3:4, groupGap=isMob?16:20;
  var padL=isMob?10:16, padR=isMob?10:16, padT=isMob?22:28, padB=isMob?38:46;
  var nMetrics=metrics.length, nMonths=months.length;
  var groupW=nMetrics*(barW+barGap)-barGap;
  var totalW=padL+nMonths*(groupW+groupGap)-groupGap+padR;
  var chartH=isMob?200:260;
  var svg='<svg class="trend-chart" viewBox="0 0 '+totalW+' '+chartH+'" style="width:'+totalW+'px;height:auto;max-width:none;display:block;margin:0 auto">';

  svg+='<defs>';
  for (var di=0;di<nMetrics;di++) {
    svg+='<linearGradient id="bg'+di+'" x1="0" y1="0" x2="0" y2="1">'
      +'<stop offset="0%" stop-color="'+metrics[di].color+'" stop-opacity="1"/>'
      +'<stop offset="100%" stop-color="'+metrics[di].color+'" stop-opacity=".4"/>'
      +'</linearGradient>';
  }
  svg+='</defs>';

  var gridSteps=4;
  for (var gi=1;gi<=gridSteps;gi++) {
    var gy=chartH-padB-(gi/gridSteps)*(chartH-padT-padB);
    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(totalW-padR)+'" y2="'+gy+'" stroke="var(--border)" stroke-width=".5" stroke-dasharray="4 4" opacity=".5"/>';
  }
  svg+='<line x1="'+padL+'" y1="'+(chartH-padB)+'" x2="'+(totalW-padR)+'" y2="'+(chartH-padB)+'" stroke="var(--border)" stroke-width="1"/>';

  for (var mi=0;mi<nMonths;mi++) {
    var gx=padL+mi*(groupW+groupGap);
    for (var mj=0;mj<nMetrics;mj++) {
      var v=parseFloat((trends[months[mi]][metrics[mj].k]||'0').replace(/[^\d.]/g,''))||0;
      var bh=Math.max(2,(v/maxV)*(chartH-padT-padB));
      var bx=gx+mj*(barW+barGap);
      var by=chartH-padB-bh;
      var shortVal;
      if (v>=10000) shortVal=(v/10000).toFixed(1)+'w';
      else if (v>=1000) shortVal=(v/1000).toFixed(1)+'k';
      else shortVal=v.toFixed(0);
      svg+='<g class="bar-group">';
      svg+='<rect x="'+bx+'" y="0" width="'+barW+'" height="'+(chartH-padB)+'" fill="transparent" style="pointer-events:all;cursor:pointer" onclick="trendClick(\''+metrics[mj].label+'\',\''+months[mi]+'\',\''+fmY(v)+'\')"></rect>';
      svg+='<rect class="trend-bar" x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="2" fill="url(#bg'+mj+')" data-label="'+metrics[mj].label+'" data-period="'+months[mi]+'" data-val="'+fmY(v)+'" style="pointer-events:none"></rect>';
      var fsLabel=isMob?7:10;
      svg+='<text x="'+(bx+barW/2)+'" y="'+(by-4)+'" text-anchor="middle" font-size="'+fsLabel+'" fill="var(--t-secondary)" font-family="var(--font-mono)">'+shortVal+'</text>';
      svg+='</g>';
    }
    var parts=months[mi].split('-');
    var fsMonth=isMob?9:12;
    svg+='<text x="'+(gx+groupW/2)+'" y="'+(chartH-4)+'" text-anchor="middle" font-size="'+fsMonth+'" fill="var(--t-quaternary)">'+(parts[1]||'')+'月</text>';
  }
  svg+='</svg>';
  return svg;
}

function setChartRange(n,btn) {
  if (!window._chartState) return;
  var btns=document.querySelectorAll('#trendRanges .range-btn');
  for (var i=0;i<btns.length;i++) btns[i].classList.remove('sel');
  btn.classList.add('sel');
  var svgDiv=document.getElementById('chartSvg');
  if (svgDiv) svgDiv.innerHTML=buildChartSvg(n);
}

function trendClick(label,period,val) {
  var tip=document.getElementById('trendTip');
  if (tip) {
    tip.style.display='inline-block';
    tip.style.opacity='1';
    tip.textContent=period+' '+label+' '+val+'元';
    setTimeout(function(){ if (tip) tip.style.opacity='0'; }, 2200);
    setTimeout(function(){ if (tip) tip.style.display='none'; }, 2500);
  }
}

var _flipTimer=null, _flippedCard=null;

function flipCard(inner) {
  if (inner===_flippedCard) {
    unflip(); return;
  }
  if (_flippedCard) unflip();
  if (_flipTimer) clearTimeout(_flipTimer);
  inner.classList.add('flipped');
  _flippedCard=inner;
  _flipTimer=setTimeout(unflip, 12000);
}

function unflip() {
  if (_flippedCard) _flippedCard.classList.remove('flipped');
  if (_flipTimer) { clearTimeout(_flipTimer); _flipTimer=null; }
  _flippedCard=null;
}

function toggleFullscreen() {
  var fs=document.getElementById('chartFS');
  if (!fs || !window._chartState) return;
  var isOpen=fs.classList.contains('open');
  if (isOpen) { fs.classList.remove('open'); document.body.style.overflow=''; return; }
  document.body.style.overflow='hidden';
  var inner=document.getElementById('chartFsInner');
  if (inner) {
    var st=window._chartState;
    var trends=st.trends, tkeys=st.tkeys, metrics=st.metrics;
    var n=12;
    var months=tkeys.slice(-n);
    if (months.length<2) months=tkeys.slice(-2);
    var maxV=0;
    metrics.forEach(function(m){
      tkeys.forEach(function(p){
        var v=parseFloat((trends[p][m.k]||'0').replace(/[^\d.]/g,''))||0;
        if (v>maxV) maxV=v;
      });
    });
    if (maxV===0) maxV=1;
    var isMob=window.innerWidth<768;
    var barW=isMob?11:20, barGap=isMob?2:5, groupGap=isMob?8:20;
    var padL=isMob?4:14, padR=isMob?4:14, padT=isMob?32:40, padB=isMob?44:52;
    var nMetrics=metrics.length, nMonths=months.length;
    var groupW=nMetrics*(barW+barGap)-barGap;
    var totalW=padL+nMonths*(groupW+groupGap)-groupGap+padR;
    var chartH=isMob?340:360;
    var svg='<svg class="trend-chart" viewBox="0 0 '+totalW+' '+chartH+'" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">';
    svg+='<defs>';
    for (var di=0;di<nMetrics;di++) {
      svg+='<linearGradient id="fsBg'+di+'" x1="0" y1="0" x2="0" y2="1">'
        +'<stop offset="0%" stop-color="'+metrics[di].color+'" stop-opacity="1"/>'
        +'<stop offset="100%" stop-color="'+metrics[di].color+'" stop-opacity=".4"/>'
        +'</linearGradient>';
    }
    svg+='</defs>';
    var gridSteps=5;
    for (var gi=1;gi<=gridSteps;gi++) {
      var gy=chartH-padB-(gi/gridSteps)*(chartH-padT-padB);
      svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(totalW-padR)+'" y2="'+gy+'" stroke="var(--border)" stroke-width=".5" stroke-dasharray="4 4" opacity=".4"/>';
    }
    svg+='<line x1="'+padL+'" y1="'+(chartH-padB)+'" x2="'+(totalW-padR)+'" y2="'+(chartH-padB)+'" stroke="var(--border)" stroke-width="1"/>';
    for (var mi=0;mi<nMonths;mi++) {
      var gx=padL+mi*(groupW+groupGap);
      for (var mj=0;mj<nMetrics;mj++) {
        var v=parseFloat((trends[months[mi]][metrics[mj].k]||'0').replace(/[^\d.]/g,''))||0;
        var bh=Math.max(2,(v/maxV)*(chartH-padT-padB));
        var bx=gx+mj*(barW+barGap);
        var by=chartH-padB-bh;
        var shortVal;
        if (v>=10000) shortVal=(v/10000).toFixed(1)+'w';
        else if (v>=1000) shortVal=(v/1000).toFixed(1)+'k';
        else shortVal=v.toFixed(0);
        var fsFont=isMob?8:12;
        svg+='<g class="bar-group">';
        svg+='<rect x="'+bx+'" y="0" width="'+barW+'" height="'+(chartH-padB)+'" fill="transparent" style="pointer-events:all;cursor:pointer" onclick="trendClick(\''+metrics[mj].label+'\',\''+months[mi]+'\',\''+fmY(v)+'\')"></rect>';
        svg+='<rect class="trend-bar" x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="3" fill="url(#fsBg'+mj+')" data-label="'+metrics[mj].label+'" data-period="'+months[mi]+'" data-val="'+fmY(v)+'" style="pointer-events:none"></rect>';
        svg+='<text x="'+(bx+barW/2)+'" y="'+(by-4)+'" text-anchor="middle" font-size="'+fsFont+'" fill="var(--t-secondary)" font-family="var(--font-mono)" font-weight="600">'+shortVal+'</text>';
        svg+='</g>';
      }
      var parts=months[mi].split('-');
      svg+='<text x="'+(gx+groupW/2)+'" y="'+(chartH-5)+'" text-anchor="middle" font-size="'+(isMob?10:14)+'" fill="var(--t-quaternary)" font-weight="500">'+(parts[1]||'')+'月</text>';
    }
    svg+='</svg>';
    inner.innerHTML=svg;
  }
  fs.classList.add('open');
}

function buildPeriodOpts() {
  var data=window._monthsData||{};
  var cur=window._curPeriod||'----/--';
  var parts=cur.split('-');
  var curY=parts[0], curM=parts[1];
  if (!curY||!curM) return;
  var years=Object.keys(data).sort();
  if (years.length===0) years=[curY];
  if (!data[curY]) data[curY]=[curM];

  var yBefore=[], yAfter=[];
  for (var i=0;i<years.length;i++) {
    var y=years[i];
    if (y<curY) yBefore.push(y);
    else if (y>curY) yAfter.push(y);
  }
  var yHasMany=yBefore.length+yAfter.length>0;

  var yh='';
  for (var bi=0;bi<yBefore.length;bi++) {
    var by=yBefore[bi];
    yh+='<span class="per-opt yr hide" role="button" tabindex="0" onclick="event.stopPropagation();pickYear(\''+by+'\')">'+by+'</span>';
  }
  yh+='<span class="per-opt yr sel" role="button" tabindex="0"'+(yHasMany?' onclick="event.stopPropagation();toggleYr()"':'')+'>'+curY+'</span>';
  for (var ai=0;ai<yAfter.length;ai++) {
    var ay=yAfter[ai];
    yh+='<span class="per-opt yr hide" role="button" tabindex="0" onclick="event.stopPropagation();pickYear(\''+ay+'\')">'+ay+'</span>';
  }

  var months=data[curY].slice().sort();
  var mBefore=[], mAfter=[];
  for (var j=0;j<months.length;j++) {
    var m=months[j];
    if (m<curM) mBefore.push(m);
    else if (m>curM) mAfter.push(m);
  }
  var mHasMany=mBefore.length+mAfter.length>0;

  var mh='';
  for (var bj=0;bj<mBefore.length;bj++) {
    var bm=mBefore[bj];
    mh+='<span class="per-opt mo hide" role="button" tabindex="0" onclick="event.stopPropagation();loadMonth(\''+curY+'-'+bm+'\')">'+bm+'</span>';
  }
  mh+='<span class="per-opt mo sel" role="button" tabindex="0"'+(mHasMany?' onclick="event.stopPropagation();toggleMo()"':'')+'>'+curM+'</span>';
  for (var aj=0;aj<mAfter.length;aj++) {
    var am=mAfter[aj];
    mh+='<span class="per-opt mo hide" role="button" tabindex="0" onclick="event.stopPropagation();loadMonth(\''+curY+'-'+am+'\')">'+am+'</span>';
  }

  document.getElementById('yrOpts').innerHTML=yh;
  document.getElementById('moOpts').innerHTML=mh;
}

function toggleYr() {
  var p=document.getElementById('periodPill');
  p.classList.remove('pick-mo');
  p.classList.toggle('pick-yr');
}
function toggleMo() {
  var p=document.getElementById('periodPill');
  p.classList.remove('pick-yr');
  p.classList.toggle('pick-mo');
}
function pickYear(y) {
  var data=window._monthsData||{};
  var cur=window._curPeriod||'';
  var curM=cur.split('-')[1]||'';
  var months=data[y]||[];
  var m=months.indexOf(curM)>=0?curM:(months.length?months[0]:curM);
  closeAll();
  loadMonth(y+'-'+m);
}
function closeAll() {
  var p=document.getElementById('periodPill');
  p.classList.remove('pick-yr','pick-mo');
}
function loadMonth(period) {
  closeAll();
  document.getElementById('error').style.display='none';
  var loadingTimer = setTimeout(function(){
    document.getElementById('loading').style.display='block';
    document.getElementById('content').style.display='none';
    document.getElementById('syncBar').style.display='none';
  }, 200);
  fetch('/api/data?period='+encodeURIComponent(period))
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d){
      if(d.error) throw new Error(d.error);
      clearTimeout(loadingTimer);
      window._lastHash=d._data_hash||'';
      window._monthsData=d.available||{};
      render(d);
    })
    .catch(function(err){
      clearTimeout(loadingTimer);
      document.getElementById('loading').style.display='none';
      document.getElementById('error').style.display='block';
      document.getElementById('error').textContent=err.message;
    });
}
document.addEventListener('click',function(e){
  var pill=document.getElementById('periodPill');
  if (pill && !pill.contains(e.target)) closeAll();
  if (!e.target.closest('.card-inner')) unflip();
});

fetch('/api/data')
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(d){
    if(d.error) throw new Error(d.error);
    window._monthsData=d.available||{};
    window._lastHash=d._data_hash||'';
    render(d);
  })
  .catch(function(err){
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent=err.message;
  });

// Background silent refresh: poll cache timestamp, re-render if newer
setInterval(function(){
  if (!window._curPeriod) return;
  fetch('/api/data?period='+encodeURIComponent(window._curPeriod))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d._data_hash!==window._lastHash){ window._lastHash=d._data_hash; window._monthsData=d.available||{}; render(d); }
    })
    .catch(function(){});
},10000);

function showAddMonth(e){
  var modal=document.getElementById('pinModal');
  var card=modal.querySelector('.add-card');
  var logo=document.querySelector('.brand-logo');
  if(logo){
    var lr=logo.getBoundingClientRect();
    var ox=((lr.left+lr.right)/2/window.innerWidth*100).toFixed(1)+'%';
    var oy=((lr.top+lr.bottom)/2/window.innerHeight*100).toFixed(1)+'%';
    card.style.setProperty('--modal-ox',ox);
    card.style.setProperty('--modal-oy',oy);
  }
  modal.classList.add('open');
  var pinInput=document.getElementById('pinInput');
  pinInput.value='';
  document.getElementById('pinStatus').textContent='';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){pinInput.focus();});
  });
}
function hidePinModal(){
  document.getElementById('pinModal').classList.remove('open');
}
function verifyPin(){
  var pin=document.getElementById('pinInput').value;
  var st=document.getElementById('pinStatus');
  if(pin==='3'){
    hidePinModal();
    setTimeout(function(){
      var addModal=document.getElementById('addModal');
      var card=addModal.querySelector('.add-card');
      var logo=document.querySelector('.brand-logo');
      if(logo){
        var lr=logo.getBoundingClientRect();
        var ox=((lr.left+lr.right)/2/window.innerWidth*100).toFixed(1)+'%';
        var oy=((lr.top+lr.bottom)/2/window.innerHeight*100).toFixed(1)+'%';
        card.style.setProperty('--modal-ox',ox);
        card.style.setProperty('--modal-oy',oy);
      }
      addModal.classList.add('open');
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){document.getElementById('addUrlInput').focus();});
      });
    },150);
  } else {
    st.textContent='密码错误';
    st.style.color='var(--red)';
    document.getElementById('pinInput').value='';
    document.getElementById('pinInput').focus();
  }
}
function hideAddMonth(){
  document.getElementById('addModal').classList.remove('open');
}

document.getElementById('addModal').addEventListener('click',function(e){
  if(e.target===this) hideAddMonth();
});
document.getElementById('pinModal').addEventListener('click',function(e){
  if(e.target===this) hidePinModal();
});

// Preview keepalive heartbeat + cache ts sync
setInterval(function(){ fetch('/api/ping',{cache:'no-cache'}); },150000);

function toggleTheme(){
  var html=document.documentElement;
  var btn=document.getElementById('themeBtn');
  var isLight=html.getAttribute('data-theme')==='light';
  if(isLight){ html.removeAttribute('data-theme'); btn.classList.remove('sunny'); localStorage.setItem('theme','dark'); }
  else { html.setAttribute('data-theme','light'); btn.classList.add('sunny'); localStorage.setItem('theme','light'); }
}
(function(){
  var saved=localStorage.getItem('theme');
  if(!saved){
    saved=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
  }
  if(saved==='light'){ document.documentElement.setAttribute('data-theme','light'); document.getElementById('themeBtn').classList.add('sunny'); }
})();
var _resizeTimer=null;
window.addEventListener('resize',function(){
  if(_resizeTimer) clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(function(){
    if(window._chartState){
      var svgDiv=document.getElementById('chartSvg');
      if(svgDiv) svgDiv.innerHTML=buildChartSvg();
    }
  },250);
});
(function(){
  var container=document.getElementById('bgParticles');
  if(!container) return;
  var count=12;
  var frag=document.createDocumentFragment();
  for(var i=0;i<count;i++){
    var dot=document.createElement('div');
    dot.className='bg-particle';
    dot.style.left=(Math.random()*100)+'%';
    dot.style.animationDuration=(12+Math.random()*16)+'s';
    dot.style.animationDelay=(Math.random()*16)+'s';
    dot.style.width=(1+Math.random()*2)+'px';
    dot.style.height=dot.style.width;
    frag.appendChild(dot);
  }
  container.appendChild(frag);
})();

/* Pause all infinite animations during scroll for performance */
(function(){
  var scrollTimer=null;
  var body=document.body;
  window.addEventListener('scroll',function(){
    if(!body.classList.contains('is-scrolling')){
      body.classList.add('is-scrolling');
    }
    if(scrollTimer) clearTimeout(scrollTimer);
    scrollTimer=setTimeout(function(){
      body.classList.remove('is-scrolling');
      scrollTimer=null;
    },150);
  },{passive:true});
})();

/* Table horizontal scroll hint */
(function(){
  function initTableScroll(){
    var tables=document.querySelectorAll('.table-scroll');
    tables.forEach(function(el){
      if(el.scrollWidth<=el.clientWidth) return;
      el.classList.add('is-scrollable');
      el.addEventListener('scroll',function(){
        el.classList.toggle('is-scrolled',el.scrollLeft+el.clientWidth>=el.scrollWidth-4);
      },{passive:true});
    });
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',initTableScroll);
  } else {
    initTableScroll();
  }
  /* Re-check after content renders */
  var origRender=window.render;
  if(typeof origRender==='function'){
    window.render=function(){
      origRender.apply(this,arguments);
      setTimeout(initTableScroll,100);
    };
  }
})();
</script>
