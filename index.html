  [data-theme="light"] .pv-cancel { background: rgba(249,115,22,.06); color: var(--t-tertiary); }

  [data-theme="light"] .sync-bar { background: var(--surface-dark); border-top-color: rgba(249,115,22,.10); }
  [data-theme="light"] .theme-toggle { border-color: rgba(249,115,22,.15); color: var(--t-secondary); }
  [data-theme="light"] .theme-toggle:hover { border-color: var(--amber); color: var(--amber); box-shadow: 0 0 20px rgba(249,115,22,.15); }
  [data-theme="light"] .theme-toggle.sunny { color: var(--amber); border-color: var(--amber); }

  }

  [data-theme="light"] .table-scroll tbody tr:hover { background: rgba(249,115,22,.06) !important; }
  [data-theme="light"] .table-scroll tbody tr:nth-child(even):hover { background: rgba(249,115,22,.08) !important; }
  [data-theme="light"] .table-scroll tbody tr.day-divider { border-top: 1px solid rgba(249,115,22,.08); }

  [data-theme="light"] .cash-section {
    background: linear-gradient(180deg, rgba(249,115,22,.035) 0%, transparent 70%), var(--surface);
  }
  [data-theme="light"] .cash-left { border-top-color: rgba(249,115,22,.10); }
  [data-theme="light"] .cash-summary {
    background: radial-gradient(ellipse 30% 25% at 30% 40%, rgba(249,115,22,.04), transparent 55%),
                radial-gradient(ellipse 20% 22% at 70% 65%, rgba(249,115,22,.03), transparent 50%);
  }
  [data-theme="light"] .cash-card { background: linear-gradient(160deg, var(--surface), rgba(249,115,22,.02)); }
  [data-theme="light"] .cash-tag { background: rgba(249,115,22,.07); border-color: rgba(249,115,22,.10); }

  [data-theme="light"] .range-btn:hover { background: rgba(249,115,22,.04); }
  [data-theme="light"] .range-btn:active { background: rgba(249,115,22,.06); }
  [data-theme="light"] .fs-btn:hover { background: rgba(249,115,22,.04); }
  [data-theme="light"] .fs-btn:active { background: rgba(249,115,22,.06); }
  [data-theme="light"] .trend-legend .leg-item:hover { background: rgba(249,115,22,.05); }
  [data-theme="light"] .trend-legend .leg-item:active { background: rgba(249,115,22,.08); }

  [data-theme="light"] .panel-section {
    background: linear-gradient(180deg, rgba(249,115,22,.03) 0%, transparent 70%), var(--surface);
  }
  [data-theme="light"] .panel-section::after {
    background: radial-gradient(ellipse 35% 22% at 25% 25%, rgba(249,115,22,.04), transparent 55%),
                radial-gradient(ellipse 20% 18% at 75% 70%, rgba(249,115,22,.02), transparent 50%);
    opacity: 1;
  }
  [data-theme="light"] .panel-bg {
    background: radial-gradient(circle, rgba(249,115,22,.04), transparent 70%);
  }
  [data-theme="light"] .panel-row:hover { background: rgba(249,115,22,.03); }
  [data-theme="light"] .panel-row-tag { background: rgba(249,115,22,.04); }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-deep);
    color: var(--t-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    font-size: 14px;
    line-height: 1.6;
}

  /* ---- Ambient BG ---- */
   .bg-layer { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; contain:strict; transform:translateZ(0); }
   .bg-orb { transform:translateZ(0); }
.bg-orb {
  position: absolute; border-radius: 50%;
  opacity: var(--orb-opacity);
  backface-visibility: hidden;
}
  .bg-orb-1 { width:900px; height:900px; background:radial-gradient(circle, var(--green-glow), transparent 80%); top:-35%; left:-30%; animation:drift1 32s ease-in-out infinite; }
  .bg-orb-2 { width:700px; height:700px; background:radial-gradient(circle, var(--purple-glow), transparent 80%); bottom:-30%; right:-20%; animation:drift2 38s ease-in-out infinite; }
  .bg-orb-3 { width:600px; height:600px; background:radial-gradient(circle, var(--amber-glow), transparent 80%); top:40%; right:-35%; animation:drift3 28s ease-in-out infinite; }
  @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(80px,-60px) scale(1.1)} 50%{transform:translate(-20px,40px) scale(.9)} 75%{transform:translate(-50px,-30px) scale(1.05)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-70px,-50px) scale(1.12)} 66%{transform:translate(50px,40px) scale(.85)} }
  @keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-80px,-40px) scale(1.08)} 66%{transform:translate(30px,60px) scale(.92)} }

  .bg-particles { display:none; }

  .bg-grid {
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:var(--grid-opacity);
    background-image:
      linear-gradient(var(--grid-stroke) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-stroke) 1px, transparent 1px);
    background-size:64px 64px;
    transform:translateZ(0);
  }
  .bg-noise { display:none; }

  .app {
    position: relative; z-index: 1;
    max-width: 1080px;
    margin: 0 auto;
    padding: 44px 20px 56px;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .brand-logo {
    width: 88px; height: 88px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .brand-logo svg {
    width: 88px; height: 88px;
    stroke: var(--purple);
    animation: logo-pulse 3s ease-in-out infinite;
    transition: opacity .2s, transform .3s;
  }
  .brand-logo.hide-logo svg { opacity: 0; transform: scale(.6); animation: none; }
  .brand-logo.hide-logo::after { opacity: 0; animation: none; }
  @keyframes logo-pulse {
    0%,100% { opacity: .85; }
    50% { opacity: 1; }
  }
  .brand-logo::after {
    display: none;
  }
  @keyframes logo-halo {
    0%,100% { opacity: .6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  .brand-info h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: .08em;
    line-height: 1.2;
    color: var(--t-primary);
  }
  .brand-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow), 0 0 20px var(--green-glow);
    vertical-align: middle;
    margin: 0 6px;
    position: relative;
    top: -1px;
  }

  /* ---- PERIOD SELECTOR ---- */
  .period-group {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .period-pill {
    display: inline-flex;
    align-items: center;
    gap: 0;
    background:
      linear-gradient(180deg, rgba(255,255,255,.05) 0%, transparent 50%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.08) inset,
      0 4px 24px rgba(0,0,0,.25);
    user-select: none;
    padding: 0 4px;
  }
  #yrOpts, #moOpts { display: inline-flex; align-items: center; }

  .per-div {
    width: 1px; height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }

  .per-opt {
    display: inline-block;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    color: var(--t-primary);
    overflow: hidden;
    vertical-align: middle;
    transition: max-width .35s cubic-bezier(.34,1.56,.64,1), padding .3s ease, opacity .25s ease, color .15s, transform .2s cubic-bezier(.34,1.56,.64,1);
  }
  .per-opt:hover { color: var(--t-primary); }
  .per-opt:active { transform: scale(.9); }
  .per-opt.yr { max-width: 53px; padding: 8px 11px; letter-spacing: .02em; }
  .per-opt.yr.sel { color: var(--t-primary); }
  .per-opt.mo { max-width: 36px; padding: 8px 8px; }
  .per-opt.mo.sel { color: var(--purple); }
  [data-theme="light"] .per-opt.mo.sel { color: var(--amber); }
  .per-opt.yr.hide, .per-opt.mo.hide {
    max-width: 0;
    padding-left: 0; padding-right: 0;
    opacity: 0;
    pointer-events: none;
  }

  .period-pill.pick-yr .per-opt.yr.hide,
  .period-pill.pick-mo .per-opt.mo.hide {
    max-width: 53px;
    padding-left: 11px; padding-right: 11px;
    opacity: 1;
    pointer-events: auto;
  }
  .period-pill.pick-mo .per-opt.mo.hide {
    max-width: 36px;
    padding-left: 8px; padding-right: 8px;
  }

  @media (max-width:600px) {
    .per-opt { font-size: 13px; }
    .per-opt.yr { max-width: 46px; padding: 7px 9px; }
    .per-opt.mo { max-width: 30px; padding: 7px 6px; }
    .period-pill.pick-yr .per-opt.yr.hide { max-width: 46px; padding-left: 9px; padding-right: 9px; }
    .period-pill.pick-mo .per-opt.mo.hide { max-width: 30px; padding-left: 6px; padding-right: 6px; }
  }

  .sync-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 6px 16px;
    font-size: 11px;
    color: var(--t-quaternary);
    letter-spacing: .03em;
  background: var(--surface-dark);
  border-top: 1px solid var(--border);
}
  .sync-bar svg {
    width: 12px; height: 12px;
    flex-shrink: 0;
    color: var(--green);
    animation: syncIconSpin 3s linear infinite;
  }
  .version-link {
    margin-left: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--t-tertiary);
  }

  @keyframes syncIconSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .add-modal {
    position: fixed; inset: 0; z-index: 9999;
    visibility: hidden; opacity: 0; pointer-events: none;
    transition: visibility 0s .4s, opacity .4s ease-out;
    -webkit-tap-highlight-color: transparent;
  }
  .add-modal.open { visibility: visible; opacity: 1; pointer-events: auto; transition: visibility 0s 0s, opacity .3s ease-out; }
  .hp-box {
    position: absolute; z-index: 1;
    display: flex; align-items: center; gap: 6px;
    background: var(--surface-dark); border: 1px solid var(--border);
    border-radius: 16px; padding: 8px 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,.25), 0 0 0 1px rgba(255,255,255,.04) inset;
    opacity: 0; transform: scaleX(0) scaleY(0);
    transform-origin: var(--modal-ox, 50%) var(--modal-oy, 50%);
    transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .2s ease-out;
    left: var(--modal-left, 50%); top: var(--modal-top, 50%);
    transform: translate(-50%, -50%) scaleX(0) scaleY(0);
  }
  .add-modal.open .hp-box { transform: translate(-50%, -50%) scaleX(1) scaleY(1); opacity: 1; }
  .add-modal.dismissing .hp-box {
    transform: translate(-50%, -50%) scaleX(1.1) scaleY(.2);
    opacity: 0; filter: blur(6px);
    transition: transform .35s cubic-bezier(.4,0,1,1), opacity .3s ease-in, filter .3s ease-in;
  }
  .hp-box.add-mode {
    flex-direction: column; align-items: stretch;
    padding: 20px; border-radius: var(--radius-lg);
    min-width: 320px; max-width: 90vw;
    background:
      linear-gradient(180deg, rgba(255,255,255,.03) 0%, transparent 60%),
      var(--surface-dark);
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 0 0 1px rgba(255,255,255,.03) inset,
      0 12px 40px rgba(0,0,0,.3);
  }
  .hp-box.add-mode .add-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .hp-box.add-mode .add-title {
    font-size: 14px; font-weight: 600; color: var(--t-primary);
    letter-spacing: .02em;
  }
  .hp-box.add-mode .add-input-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px 4px 4px 12px;
    transition: border-color .2s, box-shadow .2s;
  }
  .hp-box.add-mode .add-input-row:focus-within {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(139,92,246,.1);
  }
  .hp-box.add-mode .add-input-row input {
    flex: 1; border: none; background: transparent;
    color: var(--t-primary); font-size: 13px; outline: none;
    padding: 8px 0; min-width: 0;
  }
  .hp-box.add-mode .add-input-row input::placeholder { color: var(--t-quaternary); }
  .hp-box.add-mode .add-btn {
    width: 32px; height: 32px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; border: none; cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .hp-box.add-mode .add-btn:active { transform: scale(.9); }
  .hp-box.add-mode .add-btn svg { width: 16px; height: 16px; }
  .hp-box.add-mode .add-btn.paste { background: rgba(139,92,246,.1); color: var(--accent2); }
  .hp-box.add-mode .add-btn.paste:hover { background: rgba(139,92,246,.18); }
  .hp-box.add-mode .add-btn.go { background: var(--accent2); color: #fff; }
  .hp-box.add-mode .add-btn.go:hover { background: var(--accent2-hover); }
  .hp-box.add-mode .add-status {
    font-size: 12px; color: var(--t-tertiary);
    min-height: 18px; margin-top: 8px;
  }
  .hp-box.add-mode .add-preview {
    margin-top: 12px; padding: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: none;
  }
  .hp-box.add-mode .add-preview.show { display: block; }
  .hp-box.add-mode .add-preview .pv-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--t-secondary);
  }
  .hp-box.add-mode .add-preview .pv-val {
    font-family: var(--font-mono); font-weight: 600; color: var(--t-primary);
  }
  .hp-box.add-mode .add-preview .pv-acts {
    display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
  }
  .hp-box.add-mode .add-preview .pv-acts button {
    padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; transition: background .2s, transform .15s;
  }
  .hp-box.add-mode .add-preview .pv-acts button:active { transform: scale(.94); }
  .pv-cancel { background: rgba(255,255,255,.06); color: var(--t-tertiary); }
  .pv-cancel:hover { background: rgba(255,255,255,.1); }
  .pv-confirm { background: var(--accent2); color: #fff; }
  .pv-confirm:hover { background: var(--accent2-hover); }
  .hp-icon {
    width: 30px; height: 30px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: rgba(139,92,246,.1); color: var(--accent2);
  }
  .hp-icon svg { width: 15px; height: 15px; }
  .hp-input {
    border: none; background: transparent; outline: none;
    color: var(--t-primary); font-size: 14px;
    width: 100px; padding: 4px 0;
  }
  .hp-input::placeholder { color: var(--t-quaternary); font-size: 13px; }
  .hp-input.pin-mode {
    width: 36px; font-size: 20px; font-weight: 700;
    font-family: var(--font-mono); letter-spacing: .1em; text-align: center;
  }
  .hp-status {
    position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 600;
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity .2s;
  }
  .hp-status.show { opacity: 1; }

  .theme-toggle {
    position: fixed; top: 16px; right: 20px; z-index: 100;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .3s, border-color .3s, box-shadow .3s, transform .4s cubic-bezier(.4,0,.2,1);
    color: var(--t-secondary);
    overflow: hidden;
  }
  .theme-toggle .icon-sun,
  .theme-toggle .icon-moon {
    width: 20px; height: 20px;
    position: absolute;
    transition: transform .5s cubic-bezier(.4,0,.2,1), opacity .3s;
  }
  .theme-toggle .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }
  .theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg) scale(.5); }
  .theme-toggle.sunny .icon-sun { opacity: 0; transform: rotate(90deg) scale(.5); }
  .theme-toggle.sunny .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
  .theme-toggle:hover { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 20px var(--purple-glow); }
  .theme-toggle:active { transform: rotate(30deg) scale(.85); }
  .theme-toggle.sunny { color: var(--amber); border-color: var(--amber); }
  .theme-toggle.sunny:hover { box-shadow: 0 0 20px var(--amber-glow); }

  /* ---- STAT CARDS ---- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    position: relative;
    background:
      linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 60%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 24px;
    contain: layout style paint;
    overflow: hidden;
    backface-visibility: hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 0 0 1px rgba(255,255,255,.03) inset,
      0 4px 24px rgba(0,0,0,.18);
    transition: border-color .3s, transform .4s cubic-bezier(.25,.8,.25,1.2);
  }
  .stat-card:hover {
    border-color: var(--border-hover);
    box-shadow:
      0 1px 0 rgba(255,255,255,.1) inset,
      0 0 0 1px rgba(255,255,255,.06) inset,
      0 12px 48px rgba(0,0,0,.28);
    transform: perspective(600px) rotateX(2deg) translateY(-4px);
  }
  .stat-card:active {
    transform: perspective(600px) rotateX(0deg) translateY(0) scale(.98);
    transition-duration: .1s;
  }
  .stat-card::after {
    content: '';
    position: absolute; inset: -25%;
    border-radius: inherit;
    pointer-events: none; z-index: -1;
    background:
      radial-gradient(ellipse 35% 30% at 25% 35%, rgba(255,255,255,.07), transparent 60%),
      radial-gradient(ellipse 22% 28% at 72% 65%, rgba(255,255,255,.04), transparent 55%),
      radial-gradient(ellipse 18% 22% at 50% 15%, rgba(255,255,255,.05), transparent 50%);
    opacity: .5;
  }
  .stat-card::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: var(--radius-lg);
    opacity: 0; transition: opacity .4s;
    pointer-events: none; z-index: -1;
  }
  .stat-card.s-income::before { background: radial-gradient(ellipse 80% 80% at 0% 0%, var(--green-glow), transparent); }
  .stat-card.s-meituan::before { background: radial-gradient(ellipse 80% 80% at 0% 0%, var(--amber-glow), transparent); }
  .stat-card.s-expense::before { background: radial-gradient(ellipse 80% 80% at 0% 0%, var(--red-glow), transparent); }
  .stat-card.s-cash::before { background: radial-gradient(ellipse 80% 80% at 0% 0%, var(--purple-glow), transparent); }
  .stat-card:hover::before { opacity: 1; }

  .stat-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    position: relative; z-index: 1;
  }
  .s-income .stat-icon { background: rgba(16,185,129,.14); color: var(--green); }
  .s-meituan .stat-icon { background: rgba(245,158,11,.14); color: var(--amber); }
  .s-expense .stat-icon { background: rgba(244,63,94,.14); color: var(--red); }
  .s-cash .stat-icon { background: rgba(255,26,117,.14); color: var(--pink); }
  .stat-icon svg { width: 16px; height: 16px; }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--t-quaternary);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    position: relative; z-index: 1;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -.04em;
    line-height: 1.15;
    position: relative; z-index: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat-value.mono { font-family: var(--font-mono); font-size: 25px; font-weight: 700; }
  .s-income .stat-value { color: var(--green); }
  .s-meituan .stat-value { color: var(--amber); }
  .s-expense .stat-value { color: var(--red); }
  .s-cash .stat-value { color: var(--pink); }

  .stat-hint {
    font-size: 12px;
    color: var(--hint-color);
    margin-top: 6px;
    position: relative; z-index: 1;
    line-height: 1.4;
  }

  /* ---- ITEM CARDS ---- */
  .items {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .item-card {
    position: relative; perspective: 800px;
    border-radius: var(--radius);
    overflow: visible;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
    cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    width: 100%; min-height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    background:
      linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 70%),
      var(--surface);
    border: 1px solid var(--border);
    border-top-color: rgba(255,255,255,.12);
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 4px 20px rgba(0,0,0,.14);
    contain: layout style paint;
    text-align: center;
    overflow: hidden;
    position: relative;
  }
  .card-face::after {
    content: '';
    position: absolute; inset: -25%;
    border-radius: inherit;
    pointer-events: none; z-index: -1;
    background:
      radial-gradient(ellipse 30% 25% at 30% 40%, rgba(255,255,255,.06), transparent 55%),
      radial-gradient(ellipse 20% 22% at 70% 65%, rgba(255,255,255,.04), transparent 50%);
    opacity: .45;
  }
  .card-front { padding: 18px 16px; }
  .card-back {
    position: absolute; inset: 0;
    transform: rotateY(180deg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; padding: 16px 10px;
    background: linear-gradient(160deg, var(--surface), rgba(255,255,255,.03));
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-back .fb-island {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 20px;
    padding: 2px 12px;
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    color: var(--t-primary);
    white-space: nowrap;
    z-index: 2;
  }
  .card-back .fb-cur {
    font-size: 22px; font-family: var(--font-mono); font-weight: 800;
    letter-spacing: -.03em; line-height: 1;
    animation: cashBreathe 2s ease-in-out infinite;
    color: var(--t-primary);
    margin-top: 20px;
  }
  .card-back .fb-prev {
    font-size: 10px; color: var(--t-tertiary);
    font-family: var(--font-mono); font-weight: 600;
    white-space: nowrap;
  }
  .card-back .fb-delta {
    font-size: 12px; font-family: var(--font-mono); font-weight: 700;
    display: flex; align-items: center; gap: 2px;
    padding: 2px 6px; border-radius: 10px;
  }
  .card-back .fb-delta.up { color: var(--green); background: rgba(16,185,129,.08); }
  .card-back .fb-delta.down { color: var(--red); background: rgba(244,63,94,.08); }
  .card-back .fb-arrow { font-size: 9px; }

  .card-inner:not(.flipped):hover .card-front {
    border-color: var(--border-hover);
    box-shadow:
      0 1px 0 rgba(255,255,255,.1) inset,
      0 12px 40px rgba(0,0,0,.24);
    transform: perspective(500px) rotateX(3deg) translateY(-3px);
  }
  .card-inner.flipped:hover .card-back {
    border-color: var(--border-hover);
  }
  .card-front::before, .card-back::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: var(--radius);
    opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  .ic-green .card-front::before, .ic-green .card-back::before { background: radial-gradient(ellipse 60% 60% at 50% 0%, var(--green-glow), transparent); }
  .ic-red .card-front::before, .ic-red .card-back::before { background: radial-gradient(ellipse 60% 60% at 50% 0%, var(--red-glow), transparent); }
  .ic-amber .card-front::before, .ic-amber .card-back::before { background: radial-gradient(ellipse 60% 60% at 50% 0%, var(--amber-glow), transparent); }
  .ic-purple .card-front::before, .ic-purple .card-back::before { background: radial-gradient(ellipse 60% 60% at 50% 0%, var(--purple-glow), transparent); }
  .card-inner:not(.flipped):hover .card-front::before { opacity: 1; }
  .card-inner.flipped:hover .card-back::before { opacity: 1; }

  .item-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center; justify-content: center;
    margin-bottom: 10px;
    position: relative; z-index: 1;
  }
  .item-icon svg { width: 14px; height: 14px; }
  .ic-green .item-icon { background: rgba(16,185,129,.12); color: var(--green); }
  .ic-red .item-icon { background: rgba(244,63,94,.12); color: var(--red); }
  .ic-amber .item-icon { background: rgba(245,158,11,.12); color: var(--amber); }
  .ic-purple .item-icon { background: rgba(139,92,246,.12); color: var(--purple); }

  .item-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    color: var(--t-quaternary);
    margin-bottom: 4px;
    position: relative; z-index: 1;
  }
  .item-value {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -.02em;
    font-family: var(--font-mono);
    position: relative; z-index: 1;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
  }
  .ic-green .item-value { color: var(--green); }
  .ic-red .item-value { color: var(--red); }
  .ic-amber .item-value { color: var(--amber); }
  .ic-purple .item-value { color: var(--pink); }

  .cash-blink {
    animation: cashBreathe 1.8s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes cashBreathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .card-tooltip {
    display: none;
  }

  /* ---- TREND PANEL ---- */
  .trend-panel {
    background:
      linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 60%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 16px;
    margin-bottom: 32px;
    overflow: hidden;
    contain: layout style paint;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 4px 24px rgba(0,0,0,.18);
  }
  .trend-panel::after {
    content: '';
    position: absolute; inset: -25%;
    pointer-events: none; z-index: -1;
    background:
      radial-gradient(ellipse 40% 25% at 20% 30%, rgba(255,255,255,.06), transparent 60%),
      radial-gradient(ellipse 25% 20% at 80% 70%, rgba(255,255,255,.04), transparent 55%);
    opacity: .4;
  }
  .trend-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
  .trend-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--t-quaternary);
    white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .trend-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--amber);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .trend-ranges { display: flex; gap: 4px; }
  .range-btn {
    font-size: 10px; font-family: inherit; color: var(--t-tertiary);
    background: transparent; border: 1px solid var(--border); border-radius: 5px;
    padding: 3px 10px; cursor: pointer; transition: color .2s, border-color .2s, background .2s, transform .15s; white-space: nowrap;
  }
  .range-btn:hover { color: var(--t-primary); border-color: var(--border-hover); background: rgba(255,255,255,.03); }
  .range-btn:active { background: rgba(255,255,255,.05); transform: scale(.92); }
  .range-btn.sel {
    color: var(--amber); border-color: var(--amber); background: var(--amber-glow);
  }
  .range-btn.sel:hover { background: rgba(245,158,11,.15); }
  .fs-btn {
    flex-shrink: 0; width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
    color: var(--t-tertiary); transition: color .2s, background .2s, border-color .2s, transform .15s;
  }
  .fs-btn svg { width: 14px; height: 14px; }
  .fs-btn:hover { color: var(--t-primary); border-color: var(--border-hover); background: rgba(255,255,255,.03); }
  .fs-btn:active { background: rgba(255,255,255,.05); color: var(--amber); transform: scale(.9); }
  .trend-chart-wrap { overflow-x: auto; overscroll-behavior-x: contain; text-align: center; }
  .trend-legend {
    display: flex; justify-content: center; gap: 16px;
    margin-top: 10px; font-size: 10px; color: var(--t-tertiary); flex-wrap: wrap;
  }
  .trend-legend .leg-item { display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: background .2s, opacity .2s; }
  .trend-legend .leg-item:hover { background: rgba(255,255,255,.05); }
  .trend-legend .leg-item:active { background: rgba(255,255,255,.08); }
  .trend-legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; }
  .trend-legend .dot.pink { background: var(--pink); }
  .trend-legend .dot.green { background: var(--green); }
  .trend-legend .dot.red { background: var(--red); }
  .trend-legend .dot.amber { background: var(--amber); }
  .trend-legend .dot.cyan { background: #22d3ee; }

  /* ---- CHART INTERACTION ---- */
  .chart-skeleton {
    position: relative;
    background: rgba(255,255,255,.02);
    border-radius: 8px;
    height: 200px; margin: 8px 0;
    overflow: hidden;
  }
  .chart-skeleton::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.04) 50%, transparent 70%);
    background-size: 200% 100%;
  }
  .chart-skeleton::after {
    content: '';
    position: absolute;
    bottom: 30px; left: 20px; right: 20px;
    height: 120px;
    background:
      repeating-linear-gradient(90deg,
        rgba(255,255,255,.04) 0px, rgba(255,255,255,.04) 14px,
        transparent 14px, transparent 18px,
        rgba(255,255,255,.03) 18px, rgba(255,255,255,.03) 28px,
        transparent 28px, transparent 32px,
        rgba(255,255,255,.05) 32px, rgba(255,255,255,.05) 42px,
        transparent 42px, transparent 46px,
        rgba(255,255,255,.03) 46px, rgba(255,255,255,.03) 56px,
        transparent 56px, transparent 60px,
        rgba(255,255,255,.04) 60px, rgba(255,255,255,.04) 70px,
        transparent 70px, transparent 74px
      );
    mask-image: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
  }
  .trend-bar {
    transform-box: fill-box; transform-origin: bottom;
    opacity: .92;
  }
  .trend-bar:hover, .trend-bar:active { opacity: 1; filter: brightness(1.3); }
  .trend-tip {
    text-align: center; font-size: 12px; font-family: var(--font-mono);
    color: var(--t-primary); margin-top: 6px;
    padding: 6px 12px; background: var(--surface); border-radius: 6px;
    display: inline-block; transition: opacity .2s;
  }
  .trend-tip-wrap { text-align: center; min-height: 28px; }

  /* ---- CHART FULLSCREEN ---- */
  .chart-fullscreen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg-deep);
    display: none; align-items: center; justify-content: center;
  }
  .chart-fullscreen.open { display: flex; }
  .chart-fs-inner {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; box-sizing: border-box;
  }
  .chart-fs-inner .trend-chart { max-width: 100%; max-height: 100%; }
  .fs-close {
    position: absolute; top: 16px; right: 16px; z-index: 1;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--t-secondary); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, color .2s, border-color .2s;
  }
  .fs-close:hover, .fs-close:active { background: var(--surface-hover); color: var(--t-primary); border-color: var(--border-hover); }
  @media (max-width: 768px) {
    .chart-fs-inner {
      transform: rotate(90deg);
      width: 100vh; height: 100vw;
      padding: 12px;
      flex-direction: row;
    }
    .fs-close { top: 8px; right: 8px; width: 32px; height: 32px; font-size: 14px; }
  }

  /* ---- GLASS PANEL ---- */
  .panel {
    background:
      linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 70%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 4px 24px rgba(0,0,0,.18);
    contain: layout style paint;
  }
  .panel::after {
    content: '';
    position: absolute; inset: -25%;
    pointer-events: none; z-index: -1;
    background:
      radial-gradient(ellipse 35% 22% at 25% 25%, rgba(255,255,255,.05), transparent 55%),
      radial-gradient(ellipse 20% 18% at 75% 70%, rgba(255,255,255,.03), transparent 50%);
    opacity: .35;
  }
  .cols-2 .panel { margin-bottom: 0; }

  .panel-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--t-secondary);
  }
  .panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pd-green { background: var(--green); box-shadow: 0 0 10px var(--green-glow); }
  .pd-red { background: var(--red); box-shadow: 0 0 10px var(--red-glow); }
  .pd-purple { background: var(--purple); box-shadow: 0 0 10px var(--purple-glow); }

  .panel-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 24px;
    font-size: 14px;
    color: var(--t-secondary);
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .panel-row:last-child { border-bottom: none; }
  .panel-row:hover { background: rgba(255,255,255,.02); }

  .panel-row .val {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -.01em;
  }
  .val-green { color: var(--green); }
  .val-red { color: var(--red); }
  .val-amber { color: var(--amber); }

  .panel-row.subtotal {
    background: rgba(255,255,255,.03);
    border-top: 1px solid var(--border);
    font-weight: 700;
    font-size: 15px;
    color: var(--t-primary);
  }
  .panel-row.subtotal .val { font-size: 16px; }

  /* ---- CASH HERO ---- */
  .cash-section {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--cash-from) 0%, var(--cash-mid) 40%, var(--cash-to) 100%);
    padding: 32px 36px;
    margin-bottom: 32px;
    box-shadow: 0 8px 48px var(--cash-glow), 0 0 100px rgba(139,92,246,.08);
  }
  .cash-section::before {
    content: '';
    position: absolute;
    top: -60%; right: -25%;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);
    pointer-events: none;
  }
  .cash-section::after {
    content: '';
    position: absolute;
    bottom: -40%; left: -15%;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(167,139,250,.12), transparent 70%);
    pointer-events: none;
  }

  .cash-inner {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cash-left .cash-title {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: .04em;
    color: rgba(255,255,255,.85);
    margin-bottom: 4px;
  }
  .cash-left .cash-eq {
    font-size: 12px;
    font-family: var(--font-mono);
    font-weight: 500;
    color: rgba(255,255,255,.4);
    letter-spacing: -.02em;
  }
  .cash-right .cash-amount {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -.04em;
    color: #fff;
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
  }

  /* ---- ALERT ---- */
  .alert {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 0 4px;
    font-size: 12px;
    line-height: 1.6;
    margin-top: 0;
    margin-bottom: 16px;
    color: var(--amber);
    font-weight: 400;
  }
  .alert svg { flex-shrink: 0; width: 14px; height: 14px; color: var(--amber); margin-top: 1px; opacity: .7; }

  /* ---- TABLE ---- */
   .table-scroll {
     overflow-x: auto;
     overscroll-behavior-x: contain;
     position: relative;
   }
   .table-scroll::after {
     content: '';
     position: sticky;
     right: 0; top: 0; bottom: 0;
     width: 32px;
     background: linear-gradient(90deg, transparent, var(--bg-deep));
     pointer-events: none;
     z-index: 3;
     opacity: 0;
     transition: opacity .2s;
   }
   .table-scroll.is-scrollable::after { opacity: 1; }
   .table-scroll.is-scrolled::after { opacity: 0; }
  .table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .table-scroll::-webkit-scrollbar-track { background: transparent; }
  .table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
  .table-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.25); }

  body::-webkit-scrollbar { width: 8px; }
  body::-webkit-scrollbar-track { background: var(--bg-deep); }
  body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }
  body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }

  .table-scroll table {
    width: 100%;
    min-width: 860px;
    border-collapse: collapse;
    font-size: 13px;
  }

  .table-scroll thead { position: sticky; top: 0; z-index: 2; }
  .table-scroll thead tr::after {
    content: '';
    position: absolute; inset: 0;
    background: var(--thead-bg);
    z-index: -1;
  }
  .table-scroll thead th {
    color: var(--t-primary);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .04em;
    padding: 14px 16px 12px;
    text-align: left;
    border-bottom: 2px solid rgba(255,255,255,.12);
    white-space: nowrap;
    position: relative;
    transition: color .2s;
  }
  .table-scroll thead th:hover { color: var(--accent2); }
  .table-scroll thead th.align-right { text-align: right; }

  .table-scroll tbody td {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,.025);
    white-space: nowrap;
    vertical-align: middle;
    font-size: 13px;
    line-height: 1.5;
    transition: background .12s, border-color .2s;
    border-left: 3px solid transparent;
  }
  .table-scroll tbody tr:nth-child(even) { background: rgba(255,255,255,.025); }
  .table-scroll tbody tr:hover { background: rgba(255,255,255,.05) !important; border-left-color: var(--accent2); }
  .table-scroll tbody tr:nth-child(even):hover { background: rgba(255,255,255,.06) !important; }

  .table-scroll tbody tr.day-divider { border-top: 1px solid rgba(255,255,255,.08); }

  td.align-right { text-align: right; }

  td.cell-date {
    color: var(--t-primary);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: -.01em;
    position: relative;
    padding-left: 14px;
  }
  td.cell-date::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent2);
    opacity: .4;
  }
  td.cell-shift {
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .02em;
  }
  td.shift-day { color: #60a5fa; }
  td.shift-night { color: #c084fc; }
  td.shift-day:empty, td.shift-night:empty { display: none; }

  td.cell-mt { color: var(--amber); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  td.cell-wf { color: var(--green); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  td.cell-sl { color: var(--green); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  td.cell-ex { color: var(--red); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  td.cell-rf { color: var(--green); font-family: var(--font-mono); font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }

  td.cell-memo {
    max-width: none;
    white-space: nowrap;
    color: var(--t-tertiary);
    font-size: 12px;
  }

  /* ---- LOADING ---- */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 120px 0;
    color: var(--t-secondary);
    font-size: 14px;
    font-weight: 500;
  }
  .loading-ring {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--purple);
    animation: spin .65s linear infinite;
    box-shadow: 0 0 14px rgba(139,92,246,.25), 0 0 4px rgba(139,92,246,.4) inset;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 48px;
    color: var(--red);
    font-size: 14px;
    font-weight: 500;
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 860px) {
    .app { padding: 28px 12px 40px; }
    .brand-logo { width: 66px; height: 66px; }
    .brand-logo svg { width: 66px; height: 66px; }
    .brand-info h1 { font-size: 20px; }
    .stats { grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { padding: 20px 16px; }
    .stat-value { font-size: 23px; }
    .stat-value.mono { font-size: 20px; }
    .items { grid-template-columns: repeat(3, 1fr); }
    .table-scroll table { min-width: 700px; font-size: 12px; }
    .table-scroll thead th { padding: 10px 10px; font-size: 12px; }
    .table-scroll tbody td { padding: 8px 10px; font-size: 12px; }
    .panel-row { padding: 13px 18px; }
    .panel-head { padding: 15px 18px; }
    .trend-panel { padding: 16px 10px; }
    .trend-header { flex-wrap: wrap; }
    .range-btn { font-size: 9px; padding: 3px 8px; }
  }

  @media (max-width: 420px) {
    .items { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .card-front { padding: 14px 8px; }
    .item-icon { width: 28px; height: 28px; margin-bottom: 6px; }
    .item-icon svg { width: 13px; height: 13px; }
    .item-title { font-size: 10px; margin-bottom: 2px; letter-spacing: .03em; }
    .item-value { font-size: 14px; }
    .card-back { padding: 14px 8px; }
    .card-back .fb-island { font-size: 10px; padding: 2px 10px; }
    .card-back .fb-cur { font-size: 17px; margin-top: 18px; }
    .card-back .fb-prev { font-size: 9px; }
    .card-back .fb-delta { font-size: 11px; padding: 1px 5px; }
    .card-back .fb-delta { font-size: 12px; padding: 1px 6px; margin-top: 5px; }
    .stat-card { padding: 16px 14px; }
    .stat-value { font-size: 20px; }
    .stat-value.mono { font-size: 18px; }
    .trend-panel { padding: 14px 8px; }
    .trend-header { gap: 6px; }
    .trend-title { font-size: 11px; }
    .range-btn { font-size: 9px; padding: 2px 7px; }
    .fs-btn { width: 26px; height: 26px; }
    .cash-section { padding: 24px 20px; }
    .cash-right .cash-amount { font-size: 32px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

<script>
window._appVersion='dev';
function fm(v) {
  var s=String(v).replace(/[^\d.]/g,'');
  var n=parseFloat(s);
  return isNaN(n)?'':new Intl.NumberFormat('en-US',{minimumFractionDigits:0,maximumFractionDigits:2}).format(n);
}
function fmY(v) { var f=fm(v); return f?'\u00a5'+f:''; }
function isZero(v) { return isNaN(parseFloat(String(v).replace(/[^\d.]/g,''))); }
function isReallyZero(v) { return !isZero(v) && parseFloat(String(v).replace(/[^\d.]/g,''))===0; }
function fmOrBlank(v) { if (isZero(v)||isReallyZero(v)) return ''; return fm(v); }
function txtOrBlank(v) { return (!v||v==='0'||v==='0.00')?'':v; }
function hasData(r) {
  var ks=['美团','网费','售货','支出','退款'];
  for (var k=0;k<ks.length;k++) { if (!isZero(r[ks[k]])&&!isReallyZero(r[ks[k]])) return true; }
  return false;
}

function render(data) {
  var sx=window.scrollX||window.pageXOffset;
  var sy=window.scrollY||window.pageYOffset;
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('syncBar').style.display='flex';
  var curPeriod=data.period||'----/--';
  window._curPeriod=curPeriod;
  buildPeriodOpts();

  var s=data.summary||{};
  var cash=parseFloat((s['现金结余']||'0').replace(/[^\d.]/g,''))||0;
  var mt_=parseFloat((s['美团']||'0').replace(/[^\d.]/g,''))||0;
  var nf=parseFloat((s['网费']||'0').replace(/[^\d.]/g,''))||0;
  var sl=parseFloat((s['售货']||'0').replace(/[^\d.]/g,''))||0;
  var ex=parseFloat((s['支出']||'0').replace(/[^\d.]/g,''))||0;
  var getV=function(obj,key){return obj[key]||(key==='退款'?obj['退款金额']:'')||'0';};
  var rf=parseFloat(getV(s,'退款').replace(/[^\d.]/g,''))||0;
  var rev=nf+sl+rf;
  var M=' mono';

  // Store prev-month data for card comparison
  var tkeysAll=Object.keys(data.trends||{}).sort();
  var prevSum=null, prevPeriod=null;
  var cp=data.period||'';
  for(var ti=0;ti<tkeysAll.length;ti++){
    if(tkeysAll[ti]===cp){ if(ti>0){prevPeriod=tkeysAll[ti-1]; prevSum=((data.trends||{})[prevPeriod]||{});} break; }
  }
  if(!prevPeriod&&tkeysAll.length>1){ prevPeriod=tkeysAll[tkeysAll.length-2]; prevSum=((data.trends||{})[prevPeriod]||{}); }
  window._cardCompare={now:s, prev:prevSum, prevPeriod:prevPeriod, curPeriod:cp};

  var h='';

  /* --- Item cards --- */
  var cardDefs=[
    {key:'网费', cls:'ic-green', cur:nf, icon:'<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>'},
    {key:'售货', cls:'ic-green', cur:sl, icon:'<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>'},
    {key:'退款', cls:'ic-green', cur:rf, icon:'<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>'},
    {key:'支出', cls:'ic-red', cur:ex, icon:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>'},
    {key:'美团', cls:'ic-amber', cur:mt_, icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'},
    {key:'现金', cls:'ic-purple', cur:cash, icon:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>', blink:true}
  ];
  h+='<div class="items">';
  for (var ci=0;ci<cardDefs.length;ci++) {
    var cd=cardDefs[ci];
    var ck=cd.key==='现金'?'现金结余':cd.key;
    var prevVal=prevSum?parseFloat(getV(prevSum,ck).replace(/[^\d.]/g,''))||0:0;
    var delta=cd.cur-prevVal;
    var dSign=delta>=0?'+':''; var dCls=delta>=0?'up':'down';
    var pLabel=prevPeriod||'-';
    var blinkCls=cd.blink?' cash-blink':'';
    var back=prevSum
      ?'<div class="card-face card-back"><div class="fb-island">'+cd.key+'</div><div class="fb-cur">'+fmY(cd.cur)+'</div><div class="fb-prev">'+prevPeriod.replace('-','')+' '+fmY(prevVal)+'</div><div class="fb-delta '+dCls+'">'+dSign+fmY(delta)+' <span class="fb-arrow">'+(delta>=0?'&#9650;':'&#9660;')+'</span></div></div>'
      :'<div class="card-face card-back"><div class="fb-island">'+cd.key+'</div><div class="fb-cur">'+fmY(cd.cur)+'</div><div class="fb-prev">暂无上月数据</div></div>';
    h+='<div class="item-card '+cd.cls+'"><div class="card-inner" onclick="event.stopPropagation();flipCard(this)">'
      +'<div class="card-face card-front"><div class="item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+cd.icon+'</svg></div><div class="item-title">'+cd.key+'</div><div class="item-value'+blinkCls+'" id="cv-'+cd.key+'">'+fmY(cd.cur)+'</div></div>'
      +back+'</div></div>';
  }
  h+='</div>';

  /* --- Trend chart --- */
  var trends=data.trends||{};
  var tkeys=Object.keys(trends).sort();

function buildChartSvg(rangeN) {
  var st=window._chartState;
  if (!st) return '';
  var trends=st.trends, tkeys=st.tkeys, metrics=st.metrics;
  var n=rangeN||st.rangeN||2;
  st.rangeN=n;
  var months=tkeys.slice(-n);
  if (months.length<2) months=tkeys.slice(-2);

  var maxV=0;
  metrics.forEach(function(m){
    tkeys.forEach(function(p){
      var v=parseFloat((trends[p][m.k]||'0').replace(/[^\d.]/g,''))||0;
      if (v>maxV) maxV=v;
    });
  });
  if (maxV===0) maxV=1;

  var isMob=window.innerWidth<768;
  var barW=isMob?13:18, barGap=isMob?3:4, groupGap=isMob?16:20;
  var padL=isMob?10:16, padR=isMob?10:16, padT=isMob?22:28, padB=isMob?38:46;
  var nMetrics=metrics.length, nMonths=months.length;
  var groupW=nMetrics*(barW+barGap)-barGap;
  var totalW=padL+nMonths*(groupW+groupGap)-groupGap+padR;
  var chartH=isMob?200:260;
  var svg='<svg class="trend-chart" viewBox="0 0 '+totalW+' '+chartH+'" style="width:'+totalW+'px;height:auto;max-width:none;display:block;margin:0 auto">';

  svg+='<defs>';
  for (var di=0;di<nMetrics;di++) {
    svg+='<linearGradient id="bg'+di+'" x1="0" y1="0" x2="0" y2="1">'
      +'<stop offset="0%" stop-color="'+metrics[di].color+'" stop-opacity="1"/>'
      +'<stop offset="100%" stop-color="'+metrics[di].color+'" stop-opacity=".4"/>'
      +'</linearGradient>';
  }
  svg+='</defs>';

  var gridSteps=4;
  for (var gi=1;gi<=gridSteps;gi++) {
    var gy=chartH-padB-(gi/gridSteps)*(chartH-padT-padB);
    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(totalW-padR)+'" y2="'+gy+'" stroke="var(--border)" stroke-width=".5" stroke-dasharray="4 4" opacity=".5"/>';
  }
  svg+='<line x1="'+padL+'" y1="'+(chartH-padB)+'" x2="'+(totalW-padR)+'" y2="'+(chartH-padB)+'" stroke="var(--border)" stroke-width="1"/>';

  for (var mi=0;mi<nMonths;mi++) {
    var gx=padL+mi*(groupW+groupGap);
    for (var mj=0;mj<nMetrics;mj++) {
      var v=parseFloat((trends[months[mi]][metrics[mj].k]||'0').replace(/[^\d.]/g,''))||0;
      var bh=Math.max(2,(v/maxV)*(chartH-padT-padB));
      var bx=gx+mj*(barW+barGap);
      var by=chartH-padB-bh;
      var shortVal;
      if (v>=10000) shortVal=(v/10000).toFixed(1)+'w';
      else if (v>=1000) shortVal=(v/1000).toFixed(1)+'k';
      else shortVal=v.toFixed(0);
      svg+='<g class="bar-group">';
      svg+='<rect x="'+bx+'" y="0" width="'+barW+'" height="'+(chartH-padB)+'" fill="transparent" style="pointer-events:all;cursor:pointer" onclick="trendClick(\''+metrics[mj].label+'\',\''+months[mi]+'\',\''+fmY(v)+'\')"></rect>';
      svg+='<rect class="trend-bar" x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="2" fill="url(#bg'+mj+')" data-label="'+metrics[mj].label+'" data-period="'+months[mi]+'" data-val="'+fmY(v)+'" style="pointer-events:none"></rect>';
      var fsLabel=isMob?7:10;
      svg+='<text x="'+(bx+barW/2)+'" y="'+(by-4)+'" text-anchor="middle" font-size="'+fsLabel+'" fill="var(--t-secondary)" font-family="var(--font-mono)">'+shortVal+'</text>';
      svg+='</g>';
    }
    var parts=months[mi].split('-');
    var fsMonth=isMob?9:12;
    svg+='<text x="'+(gx+groupW/2)+'" y="'+(chartH-4)+'" text-anchor="middle" font-size="'+fsMonth+'" fill="var(--t-quaternary)">'+(parts[1]||'')+'月</text>';
  }
  svg+='</svg>';
  return svg;
}

var _flipTimer=null, _flippedCard=null;

function flipCard(inner) {
  if (inner===_flippedCard) {
    unflip(); return;
  }
  if (_flippedCard) unflip();
  if (_flipTimer) clearTimeout(_flipTimer);
  inner.classList.add('flipped');
  _flippedCard=inner;
  _flipTimer=setTimeout(unflip, 12000);
}

function unflip() {
  if (_flippedCard) _flippedCard.classList.remove('flipped');
  if (_flipTimer) { clearTimeout(_flipTimer); _flipTimer=null; }
  _flippedCard=null;
}

function buildPeriodOpts() {
  var data=window._monthsData||{};
  var cur=window._curPeriod||'----/--';
  var parts=cur.split('-');
  var curY=parts[0], curM=parts[1];
  if (!curY||!curM) return;
  var years=Object.keys(data).sort();
  if (years.length===0) years=[curY];
  var localData=data;
  if (!data[curY]) {localData={}; for(var k in data) localData[k]=data[k]; localData[curY]=[curM];}

  var yBefore=[], yAfter=[];
  for (var i=0;i<years.length;i++) {
    var y=years[i];
    if (y<curY) yBefore.push(y);
    else if (y>curY) yAfter.push(y);
  }
  var yHasMany=yBefore.length+yAfter.length>0;

  var yh='';
  for (var bi=0;bi<yBefore.length;bi++) {
    var by=yBefore[bi];
    yh+='<span class="per-opt yr hide" role="button" tabindex="0" onclick="event.stopPropagation();pickYear(\''+by+'\')">'+by+'</span>';
  }
  yh+='<span class="per-opt yr sel" role="button" tabindex="0"'+(yHasMany?' onclick="event.stopPropagation();toggleYr()"':'')+'>'+curY+'</span>';
  for (var ai=0;ai<yAfter.length;ai++) {
    var ay=yAfter[ai];
    yh+='<span class="per-opt yr hide" role="button" tabindex="0" onclick="event.stopPropagation();pickYear(\''+ay+'\')">'+ay+'</span>';
  }

  var months=localData[curY].slice().sort();
  var mBefore=[], mAfter=[];
  for (var j=0;j<months.length;j++) {
    var m=months[j];
    if (m<curM) mBefore.push(m);
    else if (m>curM) mAfter.push(m);
  }
  var mHasMany=mBefore.length+mAfter.length>0;

  var mh='';
  for (var bj=0;bj<mBefore.length;bj++) {
    var bm=mBefore[bj];
    mh+='<span class="per-opt mo hide" role="button" tabindex="0" onclick="event.stopPropagation();loadMonth(\''+curY+'-'+bm+'\')">'+bm+'</span>';
  }
  mh+='<span class="per-opt mo sel" role="button" tabindex="0"'+(mHasMany?' onclick="event.stopPropagation();toggleMo()"':'')+'>'+curM+'</span>';
  for (var aj=0;aj<mAfter.length;aj++) {
    var am=mAfter[aj];
    mh+='<span class="per-opt mo hide" role="button" tabindex="0" onclick="event.stopPropagation();loadMonth(\''+curY+'-'+am+'\')">'+am+'</span>';
  }

  document.getElementById('yrOpts').innerHTML=yh;
  document.getElementById('moOpts').innerHTML=mh;
}

function pickYear(y) {
  var data=window._monthsData||{};
  var cur=window._curPeriod||'';
  var curM=cur.split('-')[1]||'';
  var months=data[y]||[];
  var m=months.indexOf(curM)>=0?curM:(months.length?months[0]:curM);
  closeAll();
  loadMonth(y+'-'+m);
}
function closeAll() {
  var p=document.getElementById('periodPill');
  p.classList.remove('pick-yr','pick-mo');
}
function loadMonth(requestedPeriod) {
  closeAll();
  document.getElementById('error').style.display='none';
  window._curPeriod=requestedPeriod;
  var cached=null;
  try{ cached=JSON.parse(localStorage.getItem('cache_'+requestedPeriod)); }catch(e){}
  var loadingTimer=null;
  if(cached&&cached._data_hash!==window._lastRenderHash){
    window._lastHash=cached._data_hash||'';
    window._monthsData=cached.available||{};
    render(cached);
  } else if(cached){
    window._lastHash=cached._data_hash||'';
    window._monthsData=cached.available||{};
  } else {
    loadingTimer=setTimeout(function(){
      document.getElementById('loading').style.display='block';
      document.getElementById('content').style.display='none';
      document.getElementById('syncBar').style.display='none';
    },800);
  }
  fetch('/api/data?period='+encodeURIComponent(requestedPeriod))
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d){
      if(d.error) throw new Error(d.error);
      if(window._curPeriod && d.period !== window._curPeriod) return;
      if(loadingTimer) clearTimeout(loadingTimer);
      window._lastHash=d._data_hash||'';
      window._monthsData=d.available||{};
      render(d);
      try{ localStorage.setItem('cache_'+requestedPeriod, JSON.stringify({period:d.period,summary:d.summary,daily:d.daily,trends:d.trends,available:d.available,_data_hash:d._data_hash})); }catch(e){}
    })
    .catch(function(err){
      if(loadingTimer) clearTimeout(loadingTimer);
      if(!cached){
        document.getElementById('loading').style.display='none';
        document.getElementById('error').style.display='block';
        document.getElementById('error').textContent=err.message;
      }
    });
}
document.addEventListener('click',function(e){
  var pill=document.getElementById('periodPill');
  if (pill && !pill.contains(e.target)) closeAll();
  if (!e.target.closest('.card-inner')) unflip();
});

function fetchWithRetry(url,retries,delay){
  return fetch(url).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    if(d.error) throw new Error(d.error);
    return d;
  }).catch(function(err){
    if(retries<=0) throw err;
    return new Promise(function(resolve,reject){
      setTimeout(function(){ fetchWithRetry(url,retries-1,delay*2).then(resolve).catch(reject); },delay);
    });
  });
}

fetchWithRetry('/api/data',3,1000)
  .then(function(d){
    window._monthsData=d.available||{};
    window._lastHash=d._data_hash||'';
    render(d);
    try{
      var p=d.period||'';
      if(p) localStorage.setItem('cache_'+p, JSON.stringify({period:d.period,summary:d.summary,daily:d.daily,trends:d.trends,available:d.available,_data_hash:d._data_hash}));
    }catch(e){}
  })
  .catch(function(err){
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent=err.message+'，请刷新页面重试';
  });

// Eagerly render from localStorage cache before network resolves
(function(){
  var now=new Date();
  var cur=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  var cachedKey=localStorage.getItem('cache_'+cur) ? cur : null;
  if(!cachedKey){
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.startsWith('cache_')){ cachedKey=k.slice(6); break; }
    }
  }
  if(cachedKey){
    try{
      var d=JSON.parse(localStorage.getItem('cache_'+cachedKey));
      if(d&&d._data_hash){
        window._monthsData=d.available||{};
        window._lastHash=d._data_hash||'';
        render(d);
      }
    }catch(e){}
  }
})();

// Preview keepalive heartbeat + cache ts sync
setInterval(function(){ fetch('/api/ping',{cache:'no-cache'}); },150000);

function toggleTheme(){
  var html=document.documentElement;
  var btn=document.getElementById('themeBtn');
  var meta=document.querySelector('meta[name="theme-color"]');
  var isLight=html.getAttribute('data-theme')==='light';
  if(isLight){ html.removeAttribute('data-theme'); btn.classList.remove('sunny'); localStorage.setItem('theme','dark'); if(meta) meta.content='#070b16'; }
  else { html.setAttribute('data-theme','light'); btn.classList.add('sunny'); localStorage.setItem('theme','light'); if(meta) meta.content='#faf5f0'; }
}
(function(){
  var saved=localStorage.getItem('theme');
  if(!saved){
    saved='light';
  }
  if(saved==='light'){ document.documentElement.setAttribute('data-theme','light'); document.getElementById('themeBtn').classList.add('sunny'); }
})();
var _resizeTimer=null;
window.addEventListener('resize',function(){
  if(_resizeTimer) clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(function(){
    if(window._chartState){
      var svgDiv=document.getElementById('chartSvg');
      if(svgDiv) svgDiv.innerHTML=buildChartSvg();
    }
  },250);
});

function positionBox(boxId){
  var box=document.getElementById(boxId);
  var logo=document.querySelector('.brand-logo');
  if(logo&&box){
    var lr=logo.getBoundingClientRect();
    box.style.setProperty('--modal-left',(lr.left+lr.width/2)+'px');
    box.style.setProperty('--modal-top',(lr.top+lr.height/2)+'px');
  }
}
function showAddMonth(){
  positionBox('pinBox');
  document.querySelector('.brand-logo').classList.add('hide-logo');
  document.getElementById('pinModal').classList.add('open');
  var pinInput=document.getElementById('pinInput');
  pinInput.value='';
  var st=document.getElementById('pinStatus');
  st.className='hp-status';st.textContent='';
  startCapsuleTimer();
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){pinInput.focus();});
  });
}
function hidePinModal(){
  var modal=document.getElementById('pinModal');
  if(!modal.classList.contains('open'))return;
  modal.classList.add('dismissing');
  setTimeout(function(){
    modal.classList.remove('open','dismissing');
    document.querySelector('.brand-logo').classList.remove('hide-logo');
  },350);
}
function autoVerifyPin(){
  var pin=document.getElementById('pinInput').value;
  if(pin.length>=1){
    stopCapsuleTimer();
    fetch('/api/verify-pin?pin='+encodeURIComponent(pin))
    .then(function(r){return r.json().then(function(d){return {ok:r.ok,data:d};});})
    .then(function(res){
      if(res.ok&&res.data.ok){
        var st=document.getElementById('pinStatus');
        st.textContent='✓';st.className='hp-status show';st.style.color='var(--green)';
        document.getElementById('pinInput').blur();
        setTimeout(function(){openAddBox();},300);
      } else {
        var st=document.getElementById('pinStatus');
        st.textContent='×';st.className='hp-status show';st.style.color='var(--red)';
        setTimeout(function(){
          document.getElementById('pinInput').value='';
          st.className='hp-status';
          startCapsuleTimer();
        },500);
      }
    })
    .catch(function(){
      var st=document.getElementById('pinStatus');
      st.textContent='网络错误';st.className='hp-status show';st.style.color='var(--red)';
      setTimeout(function(){st.className='hp-status';startCapsuleTimer();},1000);
    });
  }
}
function openAddBox(){
  hidePinModal();
  setTimeout(function(){
    positionBox('addBox');
    document.querySelector('.brand-logo').classList.add('hide-logo');
    document.getElementById('addModal').classList.add('open');
    startCapsuleTimer();
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){document.getElementById('addUrlInput').focus();});
    });
  },200);
}
function hideAddMonth(){
  var modal=document.getElementById('addModal');
  if(!modal.classList.contains('open'))return;
  modal.classList.add('dismissing');
  setTimeout(function(){
    modal.classList.remove('open','dismissing');
    document.querySelector('.brand-logo').classList.remove('hide-logo');
  },350);
  document.getElementById('addUrlInput').value='';
  document.getElementById('addStatus').className='hp-status';
}
function pasteUrl(){
  if(navigator.clipboard){
    navigator.clipboard.readText().then(function(t){
      document.getElementById('addUrlInput').value=t;
      if(t.trim()) previewAddMonth();
    }).catch(function(){});
  }
}
function previewAddMonth(){
  var url=document.getElementById('addUrlInput').value.trim();
  var st=document.getElementById('addStatus');
  if(!url){st.textContent='请输入链接';st.className='hp-status show';st.style.color='var(--red)';return;}
  st.textContent='解析中...';st.className='hp-status show';st.style.color='var(--t-tertiary)';
  fetch('/api/add-month?url='+encodeURIComponent(url))
  .then(function(r){if(!r.ok) return r.json().then(function(e){throw new Error(e.error||'HTTP '+r.status)}); return r.json();})
  .then(function(d){
    if(d.error){st.textContent=d.error;st.className='hp-status show';st.style.color='var(--red)';return;}
    st.textContent='✓ '+d.period;st.className='hp-status show';st.style.color='var(--green)';
    window._monthsData=d.available||{};
    buildPeriodOpts();
    setTimeout(function(){hideAddMonth();},800);
  })
  .catch(function(e){st.textContent=e.message;st.className='hp-status show';st.style.color='var(--red)';});
}

var _capsuleTimer=null;
function startCapsuleTimer(){
  stopCapsuleTimer();
  _capsuleTimer=setTimeout(function(){
    hidePinModal();hideAddMonth();
  },5000);
}
function stopCapsuleTimer(){
  if(_capsuleTimer){clearTimeout(_capsuleTimer);_capsuleTimer=null;}
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('addModal').addEventListener('click',function(e){
    if(!e.target.closest('.hp-box')){hideAddMonth();stopCapsuleTimer();}
  });
  document.getElementById('pinModal').addEventListener('click',function(e){
    if(!e.target.closest('.hp-box')){hidePinModal();stopCapsuleTimer();}
  });
});

/* Table horizontal scroll hint */
(function(){
  function initTableScroll(){
    var tables=document.querySelectorAll('.table-scroll');
    tables.forEach(function(el){
      if(el.scrollWidth<=el.clientWidth) return;
      el.classList.add('is-scrollable');
      el.addEventListener('scroll',function(){
        el.classList.toggle('is-scrolled',el.scrollLeft+el.clientWidth>=el.scrollWidth-4);
      },{passive:true});
    });
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',initTableScroll);
  } else {
    initTableScroll();
  }
  /* Re-check after content renders */
  var origRender=window.render;
  if(typeof origRender==='function'){
    window.render=function(){
      origRender.apply(this,arguments);
      setTimeout(initTableScroll,100);
    };
  }
})();
</script>
